  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* ===== ROOT ===== */
    :root {
      --primary: #1A3A2A;
      --primary-dark: #0A1A12;
      --primary-light: #2A5A3A;
      --accent: #B8860B;
      --accent-dim: rgba(184, 134, 11, 0.08);
      --success: #2D7D5A;
      --bg-dark: #0A0A0A;
      --bg-surface: #141414;
      --bg-card: rgba(20, 20, 20, 0.7);
      --text-light: #F5F0E8;
      --text-dim: #8A8A7A;
      --text-muted: #5A5A4A;
      --card-border: rgba(184, 134, 11, 0.06);
      --glass-bg: rgba(26, 58, 42, 0.15);
      --glass-border: rgba(184, 134, 11, 0.04);
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
      --danger: #8A3A3A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      opacity: 0;
      animation: pageFadeIn 0.5s ease forwards;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 80px;
    }

    @keyframes pageFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ===== BACKGROUND ===== */
    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 40% 30% at 30% 20%, rgba(26, 58, 42, 0.10) 0%, transparent 70%),
                  linear-gradient(180deg, #0A0A0A 0%, #060606 100%);
      pointer-events: none;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.15;
      animation: glowMove 10s ease-in-out infinite alternate;
    }
    .glow-1 { width: 350px; height: 350px; background: rgba(26,58,42,0.15); top: -80px; right: -80px; }
    .glow-2 { width: 200px; height: 200px; background: rgba(184,134,11,0.03); bottom: 0; left: 0; animation-delay: -4s; }
    .glow-3 { width: 250px; height: 250px; background: rgba(26,58,42,0.08); top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }
    @keyframes glowMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -20px) scale(1.1); }
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5%;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(184, 134, 11, 0.04);
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--text-light);
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      letter-spacing: 2px;
    }
    .logo span {
      color: var(--accent);
      font-style: italic;
    }

    .back-btn {
      width: clamp(32px, 4vw, 40px);
      height: clamp(32px, 4vw, 40px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:active {
      transform: scale(0.94);
      background: rgba(184, 134, 11, 0.08);
    }
    .back-btn i {
      font-size: clamp(14px, 1.8vw, 18px);
    }

    .header-placeholder {
      width: clamp(32px, 4vw, 40px);
      flex-shrink: 0;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px 5% 40px;
      width: 100%;
    }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 30px 20px;
      margin-bottom: 20px;
    }
    .hero .icon {
      font-size: 64px;
      display: block;
      margin-bottom: 12px;
      animation: pulseIcon 2s ease-in-out infinite;
    }
    @keyframes pulseIcon {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .hero h1 {
      font-size: 28px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      color: var(--text-light);
      margin-bottom: 8px;
    }
    .hero h1 span {
      color: var(--accent);
      font-style: italic;
    }
    .hero p {
      color: var(--text-dim);
      font-size: 15px;
      font-weight: 300;
      max-width: 400px;
      margin: 0 auto;
    }

    /* ===== COUNTDOWN ===== */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 28px 0;
    }
    .countdown-item {
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px 12px;
      min-width: 70px;
      text-align: center;
    }
    .countdown-item .number {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      display: block;
      line-height: 1;
    }
    .countdown-item .label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
      display: block;
    }

    /* ===== MESSAGE ===== */
    .message-box {
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px 24px;
      text-align: center;
      margin: 16px 0 24px;
    }
    .message-box .notif-icon {
      font-size: 24px;
      color: var(--accent);
      margin-bottom: 8px;
      display: block;
    }
    .message-box p {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }
    .message-box p strong {
      color: var(--text-light);
    }

    /* ===== BOUTON NOTIFICATION ===== */
    .btn-notify {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: var(--accent);
      border: none;
      border-radius: 30px;
      color: var(--bg-dark);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
      margin-top: 8px;
    }
    .btn-notify:active {
      transform: scale(0.96);
    }
    .btn-notify:hover {
      background: #9A7209;
      box-shadow: 0 4px 20px rgba(184, 134, 11, 0.2);
    }
    .btn-notify i {
      font-size: 16px;
    }

    /* ============================================================
       NOTIFICATION BANNER
       ============================================================ */
    .notif-permission-banner {
      background: rgba(184, 134, 11, 0.06);
      border: 1px solid rgba(184, 134, 11, 0.10);
      border-radius: 12px;
      padding: 12px 16px;
      margin: 18px 0 10px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .notif-permission-banner p {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .notif-permission-banner p i {
      color: var(--accent);
    }
    .notif-permission-banner .btn-enable {
      padding: 6px 16px;
      background: var(--accent);
      border: none;
      border-radius: 30px;
      color: var(--bg-dark);
      font-weight: 600;
      font-size: 11px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .notif-permission-banner .btn-enable:active {
      transform: scale(0.95);
    }
    .notif-permission-banner .btn-enable:hover {
      background: #9A7209;
    }

    /* ============================================================
       TOAST
       ============================================================ */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      max-width: 90%;
      width: 400px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    .toast.success {
      background: #0D2A1F;
      border: 1px solid #2D7D5A;
      color: #2D7D5A;
    }
    .toast.error {
      background: #2A0D0D;
      border: 1px solid #8A3A3A;
      color: #8A3A3A;
    }
    .toast.warning {
      background: #2A1A0D;
      border: 1px solid #B8860B;
      color: #B8860B;
    }
    .toast.info {
      background: #0D1A2A;
      border: 1px solid #4A7A8A;
      color: #4A7A8A;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 480px) {
      .container { padding: 12px 4% 30px; }
      .hero .icon { font-size: 48px; }
      .hero h1 { font-size: 22px; }
      .countdown { gap: 10px; }
      .countdown-item { padding: 12px 8px; min-width: 60px; }
      .countdown-item .number { font-size: 24px; }
      .countdown-item .label { font-size: 9px; }
      .message-box { padding: 16px; }
      .btn-notify { padding: 12px 24px; font-size: 13px; }
    }

    @media (min-width: 768px) {
      .container { max-width: 700px; padding: 24px 5%; }
      .countdown-item { padding: 20px 16px; min-width: 80px; }
      .countdown-item .number { font-size: 40px; }
    }
  </style>
</head>

// ================================================================
// COMPTE À REBOURS
// ================================================================
function startCountdown(targetDate) {
  if (countdownInterval) {
    clearInterval(countdownInterval);
  }
  
  function update() {
    var now = new Date().getTime();
    var distance = targetDate - now;
    
    if (distance <= 0) {
      daysEl.textContent = '0';
      hoursEl.textContent = '0';
      minutesEl.textContent = '0';
      secondsEl.textContent = '0';
      clearInterval(countdownInterval);
      
      // Notification admin (jour J)
      var config = getPageConfig();
      notifyAdminCountdown(config.type, 0);
      
      return;
    }
    
    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);
    
    daysEl.textContent = days;
    hoursEl.textContent = String(hours).padStart(2, '0');
    minutesEl.textContent = String(minutes).padStart(2, '0');
    secondsEl.textContent = String(seconds).padStart(2, '0');
    
    // Notification admin (24h avant)
    var config = getPageConfig();
    if (days === 1 && hours === 0 && minutes === 0 && seconds === 0) {
      notifyAdminCountdown(config.type, 1);
    }
  }
  
  update();
  countdownInterval = setInterval(update, 1000);
}

// ================================================================
// NOTIFICATIONS FCM
// ================================================================
async function setupFCMNotifications() {
  try {
    if (Notification.permission === 'granted') {
      var token = await getToken(messaging, { vapidKey: VAPID_KEY });
      if (currentUser) {
        var userRef = doc(db, 'users', currentUser.uid);
        await updateDoc(userRef, { fcmToken: token, notificationsEnabled: true });
      }
      notifBadge.className = 'notif-badge';
      notifStatusText.textContent = '🔔';
      if (notifPermissionBanner) notifPermissionBanner.style.display = 'none';
      return token;
    }
    
    if (Notification.permission === 'denied') {
      notifBadge.className = 'notif-badge';
      notifStatusText.textContent = '🔕';
      if (notifPermissionBanner) notifPermissionBanner.style.display = 'none';
      return null;
    }
    
    notifBadge.className = 'notif-badge';
    notifStatusText.textContent = '🔔';
    if (notifPermissionBanner) notifPermissionBanner.style.display = 'flex';
    return null;
  } catch (error) {
    console.error('❌ Erreur FCM:', error);
    return null;
  }
}

if (enableNotifBtn) {
  enableNotifBtn.addEventListener('click', async function() {
    try {
      var permission = await Notification.requestPermission();
      if (permission === 'granted') {
        var token = await getToken(messaging, { vapidKey: VAPID_KEY });
        if (currentUser) {
          var userRef = doc(db, 'users', currentUser.uid);
          await updateDoc(userRef, { fcmToken: token, notificationsEnabled: true });
        }
        notifBadge.className = 'notif-badge';
        notifStatusText.textContent = '🔔';
        if (notifPermissionBanner) notifPermissionBanner.style.display = 'none';
        showToast('✅ Notifications activées !', 'success');
      } else {
        showToast('⚠️ Notifications désactivées.', 'warning');
      }
    } catch (error) {
      console.error('❌ Erreur permission:', error);
    }
  });
}

// ================================================================
// AUTH
// ================================================================
var authChecked = false;

onAuthStateChanged(auth, function(user) {
  if (user) {
    currentUser = user;
    localStorage.setItem('ARVEXA_current_user', user.uid);
    setupFCMNotifications();
    authChecked = true;
  } else {
    var savedUid = localStorage.getItem('ARVEXA_current_user');
    if (savedUid && !authChecked) {
      setTimeout(function() {
        if (!auth.currentUser) {
          window.location.href = 'login.html';
        }
      }, 2000);
    } else if (!authChecked) {
      window.location.href = 'login.html';
    }
    authChecked = true;
  }
});

// ================================================================
// INITIALISATION
// ================================================================
function init() {
  var config = getPageConfig();
  
  // Mettre à jour l'UI
  pageIcon.textContent = config.icon;
  pageTitle.innerHTML = config.title;
  pageDescription.textContent = config.description;
  messageTitle.textContent = config.messageTitle;
  messageText.textContent = config.messageText;
  
  // Définir la date cible
  var target = new Date();
  target.setDate(target.getDate() + config.days);
  target.setHours(0, 0, 0, 0);
  targetDate = target.getTime();
  
  // Démarrer le compte à rebours
  startCountdown(targetDate);
  
  console.log('⏳ ARVEXA - ' + config.type + ' disponible dans ' + config.days + ' jours');
}

init();

// ================================================================
// BOUTON M'AVERTIR
// ================================================================
notifyBtn.addEventListener('click', function() {
  if (Notification.permission === 'granted') {
    showToast('✅ Vous serez averti !', 'success');
  } else if (Notification.permission === 'denied') {
    showToast('⚠️ Les notifications sont bloquées.', 'warning');
  } else {
    // Demander la permission
    if (notifPermissionBanner) {
      notifPermissionBanner.style.display = 'flex';
    } else {
      Notification.requestPermission().then(function(permission) {
        if (permission === 'granted') {
          showToast('✅ Vous serez averti !', 'success');
        }
      });
    }
  }
});

console.log('⏳ ARVEXA - Page Coming Soon chargée');
</script>

<!-- admin-notifications.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARVEXA - Admin Notifications</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --accent: #B8860B;
      --bg-dark: #0A0A0A;
      --bg-card: rgba(20,20,20,0.7);
      --text-light: #F5F0E8;
      --text-dim: #8A8A7A;
      --card-border: rgba(184,134,11,0.06);
      --radius: 16px;
      --success: #2D7D5A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 700px; margin: 0 auto; }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; border-bottom: 1px solid var(--card-border);
      margin-bottom: 24px;
    }
    .logo { font-size: 24px; font-weight: 700; font-family: 'Playfair Display', serif; }
    .logo span { color: var(--accent); font-style: italic; }
    .back-btn {
      color: var(--text-light); text-decoration: none;
      padding: 8px 16px; background: var(--bg-card);
      border-radius: 8px; border: 1px solid var(--card-border);
    }
    .card {
      background: var(--bg-card); border: 1px solid var(--card-border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
    }
    .card h2 { margin-bottom: 16px; font-family: 'Playfair Display', serif; }
    .card h2 span { color: var(--accent); font-style: italic; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--text-dim); margin-bottom: 4px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 12px 16px;
      background: rgba(10,10,10,0.6); border: 1px solid var(--card-border);
      border-radius: 10px; color: var(--text-light);
      font-family: inherit; font-size: 14px; outline: none;
    }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: var(--accent);
    }
    .btn-submit {
      padding: 12px 24px; background: var(--accent); color: var(--bg-dark);
      border: none; border-radius: 10px; font-weight: 700; font-size: 15px;
      cursor: pointer; transition: background 0.2s; width: 100%;
    }
    .btn-submit:hover { background: #9A7209; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-submit .loader {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--bg-dark); border-radius: 50%;
      border-top-color: transparent; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      max-width: 90%; padding: 14px 20px; border-radius: 14px;
      font-size: 13px; font-weight: 500; transition: transform 0.35s ease;
      z-index: 9999; text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #0D2A1F; border: 1px solid #2D7D5A; color: #2D7D5A; }
    .toast.error { background: #2A0D0D; border: 1px solid #8A3A3A; color: #8A3A3A; }
    .toast.warning { background: #2A1A0D; border: 1px solid #B8860B; color: #B8860B; }
    .toast.info { background: #0D1A2A; border: 1px solid #4A7A8A; color: #4A7A8A; }
    .status-msg { padding: 12px 16px; border-radius: 10px; margin-top: 12px; display: none; }
    .status-msg.show { display: block; }
    .status-msg.success { background: rgba(45,125,90,0.1); border: 1px solid rgba(45,125,90,0.2); color: var(--success); }
    .status-msg.error { background: rgba(138,58,58,0.1); border: 1px solid rgba(138,58,58,0.2); color: #8A3A3A; }
    .status-msg.warning { background: rgba(184,134,11,0.1); border: 1px solid rgba(184,134,11,0.2); color: var(--accent); }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">ARVE<span>XA</span></div>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Retour</a>
  </div>

  <div class="card">
    <h2>📨 Envoyer une <span>notification</span></h2>
    <form id="notificationForm">
      <div class="form-group">
        <label>📌 Type</label>
        <select id="notifType">
          <option value="info">Information</option>
          <option value="success">Succès</option>
          <option value="warning">Attention</option>
          <option value="new_deposit">💰 Nouveau dépôt</option>
          <option value="investment_gain">📈 Gain d'investissement</option>
          <option value="new_referral">👥 Nouveau parrainage</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>👤 Cible</label>
        <select id="notifTarget">
          <option value="all">Tous les utilisateurs</option>
          <option value="specific">Utilisateur spécifique</option>
        </select>
      </div>
      
      <div class="form-group hidden" id="specificUserGroup">
        <label>🆔 ID Utilisateur (UID)</label>
        <input type="text" id="specificUserId" placeholder="UID de l'utilisateur">
      </div>
      
      <div class="form-group">
        <label>📝 Titre</label>
        <input type="text" id="notifTitle" placeholder="Titre de la notification" required>
      </div>
      
      <div class="form-group">
        <label>📄 Message</label>
        <textarea id="notifBody" placeholder="Contenu de la notification" required></textarea>
      </div>
      
      <button type="submit" class="btn-submit" id="sendBtn">
        <i class="fas fa-paper-plane"></i> Envoyer
      </button>
    </form>
    
    <div id="statusMessage" class="status-msg"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
  }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged } from "firebase/auth";
import { getFirestore } from "firebase/firestore";
import { 
  sendNotificationToAll, 
  sendNotificationToUser,
  setupNotifications,
  listenForMessages
} from './notifications.js';

const firebaseConfig = {
  apiKey: "AIzaSyBEbYuuUlNCLMBUHClv4UnyownNHw2q3_g",
  authDomain: "nexgen-39043.firebaseapp.com",
  projectId: "nexgen-39043",
  storageBucket: "nexgen-39043.firebasestorage.app",
  messagingSenderId: "619390144325",
  appId: "1:619390144325:web:35d96b125501e4e8b1782c",
  measurementId: "G-HC2Q5DNKDR"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById('notificationForm');
const notifTarget = document.getElementById('notifTarget');
const specificUserGroup = document.getElementById('specificUserGroup');
const specificUserId = document.getElementById('specificUserId');
const notifTitle = document.getElementById('notifTitle');
const notifBody = document.getElementById('notifBody');
const sendBtn = document.getElementById('sendBtn');
const statusMsg = document.getElementById('statusMessage');
const toast = document.getElementById('toast');

let isAdmin = false;

// Vérifier l'admin
onAuthStateChanged(auth, async (user) => {
  if (user && user.email === 'gagneavecia@gmail.com') {
    isAdmin = true;
    console.log('✅ Admin connecté');
    await setupNotifications();
    listenForMessages();
    showToast('🔔 Notifications activées', 'success');
  } else if (user) {
    showToast('⛔ Accès réservé à l\'administrateur', 'error');
    setTimeout(() => window.location.href = 'index.html', 2000);
  } else {
    showToast('⚠️ Veuillez vous connecter', 'warning');
    setTimeout(() => window.location.href = 'login.html', 2000);
  }
});

// Afficher/masquer le champ ID spécifique
notifTarget.addEventListener('change', () => {
  specificUserGroup.classList.toggle('hidden', notifTarget.value !== 'specific');
});

// Envoyer la notification
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  if (!isAdmin) {
    showToast('⛔ Vous n\'êtes pas autorisé', 'error');
    return;
  }
  
  const type = document.getElementById('notifType').value;
  const target = notifTarget.value;
  const title = notifTitle.value.trim();
  const body = notifBody.value.trim();
  const userId = specificUserId.value.trim();
  
  if (!title || !body) {
    showToast('⚠️ Veuillez remplir tous les champs', 'warning');
    return;
  }
  
  if (target === 'specific' && !userId) {
    showToast('⚠️ Veuillez entrer un ID utilisateur', 'warning');
    return;
  }
  
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="loader"></span> Envoi...';
  statusMsg.className = 'status-msg';
  
  try {
    let success = false;
    
    if (target === 'specific') {
      success = await sendNotificationToUser(userId, title, body, { type });
    } else {
      success = await sendNotificationToAll(title, body, { type });
    }
    
    if (success) {
      statusMsg.className = 'status-msg show success';
      statusMsg.textContent = '✅ Notification envoyée avec succès !';
      form.reset();
      specificUserGroup.classList.add('hidden');
    } else {
      statusMsg.className = 'status-msg show warning';
      statusMsg.textContent = '⚠️ Aucun utilisateur ciblé n\'est disponible';
    }
  } catch (error) {
    console.error('❌ Erreur:', error);
    statusMsg.className = 'status-msg show error';
    statusMsg.textContent = `❌ Erreur: ${error.message || 'Erreur inconnue'}`;
  }
  
  sendBtn.disabled = false;
  sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Envoyer';
});

function showToast(message, type = 'info') {
  toast.textContent = message;
  toast.className = `toast ${type}`;
  setTimeout(() => toast.classList.add('show'), 50);
  setTimeout(() => toast.classList.remove('show'), 4000);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="description" content="ARVEXA - Tous les services">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #1A3A2A;
      --primary-dark: #0A1A12;
      --primary-light: #2A5A3A;
      --accent: #B8860B;
      --accent-dim: rgba(184, 134, 11, 0.08);
      --success: #2D7D5A;
      --bg-dark: #0A0A0A;
      --bg-surface: #141414;
      --bg-card: rgba(20, 20, 20, 0.7);
      --text-light: #F5F0E8;
      --text-dim: #8A8A7A;
      --text-muted: #5A5A4A;
      --card-border: rgba(184, 134, 11, 0.06);
      --glass-bg: rgba(26, 58, 42, 0.15);
      --glass-border: rgba(184, 134, 11, 0.04);
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
      --danger: #8A3A3A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      opacity: 0;
      animation: pageFadeIn 0.5s ease forwards;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 80px;
    }

    @keyframes pageFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 40% 30% at 30% 20%, rgba(26, 58, 42, 0.10) 0%, transparent 70%),
                  linear-gradient(180deg, #0A0A0A 0%, #060606 100%);
      pointer-events: none;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.15;
      animation: glowMove 10s ease-in-out infinite alternate;
    }
    .glow-1 { width: 350px; height: 350px; background: rgba(26, 58, 42, 0.15); top: -80px; right: -80px; }
    .glow-2 { width: 200px; height: 200px; background: rgba(184, 134, 11, 0.03); bottom: 0; left: 0; animation-delay: -4s; }
    .glow-3 { width: 250px; height: 250px; background: rgba(26, 58, 42, 0.08); top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }
    @keyframes glowMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -20px) scale(1.1); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5%;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(184, 134, 11, 0.04);
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--text-light);
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      letter-spacing: 2px;
    }
    .logo span { color: var(--accent); font-style: italic; }

    .back-btn {
      width: clamp(32px, 4vw, 40px);
      height: clamp(32px, 4vw, 40px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:active {
      transform: scale(0.94);
      background: rgba(184, 134, 11, 0.08);
    }
    .back-btn i { font-size: clamp(14px, 1.8vw, 18px); }

    .notif-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 10px;
      font-weight: 500;
      transition: var(--transition);
      background: rgba(45, 125, 90, 0.08);
      color: var(--success);
      border: 1px solid rgba(45, 125, 90, 0.10);
    }
    .notif-badge i {
      font-size: 12px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px 5% 40px;
      width: 100%;
    }

    .hero-section {
      margin-bottom: 28px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(184, 134, 11, 0.03);
      border: 1px solid rgba(184, 134, 11, 0.04);
      border-radius: 30px;
      padding: 3px 12px;
      margin-bottom: 14px;
    }
    .hero-badge span {
      color: var(--text-dim);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .hero-badge i { color: var(--accent); font-size: 8px; }
    .hero-title {
      font-size: clamp(28px, 5vw, 36px);
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      line-height: 1.2;
      margin-bottom: 10px;
      color: var(--text-light);
    }
    .hero-title span { color: var(--accent); font-style: italic; }
    .hero-description {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 300;
    }

    .section-header {
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .section-header-left {
      border-left: 2px solid var(--accent);
      padding-left: 10px;
    }
    .section-subtitle {
      color: var(--accent);
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.5;
    }
    .section-title {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 600;
      font-family: 'Playfair Display', 'Georgia', serif;
      color: var(--text-light);
    }
    .section-title span { color: var(--accent); font-style: italic; }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .service-card {
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px 14px;
      text-align: center;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      opacity: 0;
      animation: fadeInUp 0.5s ease forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
    }
    .service-card:nth-child(1) { animation-delay: 0.05s; }
    .service-card:nth-child(2) { animation-delay: 0.10s; }
    .service-card:nth-child(3) { animation-delay: 0.15s; }
    .service-card:nth-child(4) { animation-delay: 0.20s; }
    .service-card:nth-child(5) { animation-delay: 0.25s; }
    .service-card:nth-child(6) { animation-delay: 0.30s; }
    .service-card:nth-child(7) { animation-delay: 0.35s; }
    .service-card:nth-child(8) { animation-delay: 0.40s; }
    .service-card:nth-child(9) { animation-delay: 0.45s; }
    .service-card:nth-child(10) { animation-delay: 0.50s; }
    .service-card:nth-child(11) { animation-delay: 0.55s; }
    .service-card:nth-child(12) { animation-delay: 0.60s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .service-card:active { transform: scale(0.96); }
    .service-card:hover {
      border-color: rgba(184, 134, 11, 0.10);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }
    .service-card:hover .icon { transform: scale(1.05); }

    .service-card .icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      margin-bottom: 6px;
      transition: transform 0.3s ease;
    }
    .service-card .icon.gold { background: rgba(184, 134, 11, 0.06); color: var(--accent); }
    .service-card .icon.green { background: rgba(45, 125, 90, 0.06); color: var(--success); }
    .service-card .icon.blue { background: rgba(26, 58, 42, 0.15); color: #4A7A6A; }
    .service-card .icon.purple { background: rgba(139, 63, 232, 0.06); color: #8B3FE8; }
    .service-card .icon.orange { background: rgba(212, 160, 23, 0.06); color: #D4A017; }
    .service-card .icon.red { background: rgba(138, 58, 58, 0.06); color: #8A3A3A; }
    .service-card .icon.teal { background: rgba(20, 184, 166, 0.06); color: #14B8A6; }
    .service-card .icon.indigo { background: rgba(99, 102, 241, 0.06); color: #6366F1; }
    .service-card .icon.pink { background: rgba(236, 72, 153, 0.06); color: #EC4899; }

    .service-card .name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
    }
    .service-card .desc {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 300;
      line-height: 1.3;
    }
    .service-card .badge {
      font-size: 9px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 6px;
    }
    .service-card .badge.premium {
      background: rgba(184, 134, 11, 0.10);
      color: var(--accent);
      border: 1px solid rgba(184, 134, 11, 0.15);
    }
    .service-card .badge.free {
      background: rgba(45, 125, 90, 0.10);
      color: var(--success);
      border: 1px solid rgba(45, 125, 90, 0.15);
    }
    .service-card .badge.coming {
      background: rgba(138, 58, 58, 0.08);
      color: #8A3A3A;
      border: 1px solid rgba(138, 58, 58, 0.10);
    }

    .service-card .premium-lock {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 14px;
      color: var(--accent);
      opacity: 0.5;
    }

    /* ===== NOTIFICATION BANNER ===== */
    .notif-permission-banner {
      background: rgba(184, 134, 11, 0.06);
      border: 1px solid rgba(184, 134, 11, 0.10);
      border-radius: 12px;
      padding: 12px 16px;
      margin: 18px 0 10px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .notif-permission-banner p {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .notif-permission-banner p i {
      color: var(--accent);
    }
    .notif-permission-banner .btn-enable {
      padding: 6px 16px;
      background: var(--accent);
      border: none;
      border-radius: 30px;
      color: var(--bg-dark);
      font-weight: 600;
      font-size: 11px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .notif-permission-banner .btn-enable:active {
      transform: scale(0.95);
    }
    .notif-permission-banner .btn-enable:hover {
      background: #9A7209;
    }

    /* ============================================================
       TOAST
       ============================================================ */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      max-width: 90%;
      width: 400px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #0D2A1F; border: 1px solid #2D7D5A; color: #2D7D5A; }
    .toast.error { background: #2A0D0D; border: 1px solid #8A3A3A; color: #8A3A3A; }
    .toast.warning { background: #2A1A0D; border: 1px solid #B8860B; color: #B8860B; }
    .toast.info { background: #0D1A2A; border: 1px solid #4A7A8A; color: #4A7A8A; }

    /* ============================================================
       SKELETON LOADING
       ============================================================ */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .skeleton-card {
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius);
      padding: 20px 14px;
      height: 140px;
      border: 1px solid rgba(255, 255, 255, 0.02);
      animation: skeletonPulse 1.5s ease-in-out infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .skeleton-card .skeleton-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
    }
    .skeleton-card .skeleton-line {
      height: 12px;
      width: 60%;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
    }
    .skeleton-card .skeleton-line.short {
      width: 40%;
      height: 10px;
    }

    @keyframes skeletonPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 480px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .service-card {
        padding: 14px 10px;
      }
      .service-card .icon {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }
      .service-card .name { font-size: 12px; }
      .service-card .desc { font-size: 10px; }
      .container { padding: 12px 4% 30px; }
      .skeleton-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .skeleton-card { height: 100px; padding: 14px 10px; }
      .skeleton-card .skeleton-icon { width: 32px; height: 32px; }
      .skeleton-card .skeleton-line { height: 10px; }
    }

    @media (min-width: 601px) and (max-width: 768px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      .skeleton-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    }

    @media (min-width: 769px) {
      .container {
        max-width: 850px;
        padding: 24px 5%;
      }
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .skeleton-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    }

    @media (min-width: 1024px) {
      .container {
        max-width: 1050px;
        padding: 32px 5%;
      }
      .services-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
      }
      .skeleton-grid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
    }
  </style>
</head>

function showToast(message, type) {

// ================================================================

function sleep(ms) {
  return new Promise(function(r) { setTimeout(r, ms); });
}

function withRetry(operation, label, maxRetries) {
  label = label || 'operation';
  maxRetries = maxRetries || 3;
  var lastError = null;
  
  function attempt(attemptNumber) {
    return operation().catch(function(error) {
      lastError = error;
      var isNetwork = error && (error.code === 'unavailable' || error.code === 'deadline-exceeded' || error.code === 'cancelled');
      if (!isNetwork || attemptNumber === maxRetries) {
        throw error;
      }
      console.warn('⚠️ ' + label + ' - tentative ' + attemptNumber + '/' + maxRetries + ' echouee, retry...', error.code);
      return sleep(attemptNumber * 500).then(function() {
        return attempt(attemptNumber + 1);
      });
    });
  }
  return attempt(1);
}

function setDocument(collectionName, docId, data) {
  var ref = doc(db, collectionName, docId);
  var payload = Object.assign({}, data, { _updatedAt: serverTimestamp() });
  console.log('📝 setDocument : ' + collectionName + '/' + docId);
  return withRetry(function() {
    return setDoc(ref, payload, { merge: true });
  }, 'setDocument(' + collectionName + '/' + docId + ')').then(function() {
    console.log('✅ setDocument OK : ' + collectionName + '/' + docId);
    return ref;
  });
}

// ================================================================

// ================================================================
function initializeServices() {
  console.log('🔄 Verification de la collection services...');
  var servicesRef = collection(db, 'services');
  
  return getDocs(servicesRef).then(function(snapshot) {
    if (snapshot.empty) {
      console.log('📝 Creation des ' + DEFAULT_SERVICES.length + ' services par defaut...');
      var promises = DEFAULT_SERVICES.map(function(service) {
        return setDocument('services', service.id, service);
      });
      return Promise.all(promises).then(function() {
        console.log('✅ ' + DEFAULT_SERVICES.length + ' services crees avec succes');
        return true;
      });
    }
    console.log('✅ Services deja existants (' + snapshot.size + ' documents)');
    return false;
  }).catch(function(error) {
    console.error('❌ Erreur initialisation services:', error);
    return false;
  });
}

// ================================================================
// RENDRE UNE CARTE SERVICE
// ================================================================
function renderServiceCard(service, unlocked) {
  var isPremium = service.isPremium || false;
  var isComing = service.isComing || false;
  
  var badgeText = '';
  var badgeClass = '';
  
  if (isComing) {
    badgeText = '🔜 À venir';
    badgeClass = 'coming';
  } else if (isPremium && !unlocked) {
    badgeText = '🔒 Premium';
    badgeClass = 'premium';
  } else {
    badgeText = '🆓 Gratuit';
    badgeClass = 'free';
  }

  var showLock = isPremium && !unlocked && !isComing;
  var delay = (service.order || 0) * 0.05;

  var html = '<a href="' + (service.page || '#') + '" class="service-card" style="animation-delay: ' + delay + 's;">';
  
  if (showLock) {
    html += '<span class="premium-lock"><i class="fas fa-lock"></i></span>';
  }
  
  html += '<div class="icon ' + (service.iconClass || 'blue') + '"><i class="fas ' + (service.icon || 'fa-circle') + '"></i></div>';
  html += '<div class="name">' + (service.name || 'Service') + '</div>';
  html += '<div class="desc">' + (service.description || '') + '</div>';
  
  if (badgeText) {
    html += '<span class="badge ' + badgeClass + '">' + badgeText + '</span>';
  }
  
  html += '</a>';
  return html;
}

// ================================================================
// AFFICHER LES SERVICES
// ================================================================
function renderServices(services, unlocked) {
  var available = services.filter(function(s) { return !s.isComing; }).sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
  var coming = services.filter(function(s) { return s.isComing; }).sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
  
  servicesGrid.classList.remove('skeleton-grid');
  servicesGrid.innerHTML = available.map(function(s) { return renderServiceCard(s, unlocked); }).join('');
  
  if (coming.length > 0) {
    comingSoonHeader.style.display = 'block';
    comingSoonGrid.innerHTML = coming.map(function(s) { return renderServiceCard(s, unlocked); }).join('');
  } else {
    comingSoonHeader.style.display = 'none';
    comingSoonGrid.innerHTML = '';
  }
}

// ================================================================
// CHARGER LES SERVICES DEPUIS FIRESTORE
// ================================================================
function loadServices() {
  var q = query(collection(db, 'services'), orderBy('order', 'asc'));
  
  return onSnapshot(q, function(snapshot) {
    var services = [];
    snapshot.forEach(function(doc) {
      services.push(Object.assign({ id: doc.id }, doc.data()));
    });
    if (services.length > 0) {
      renderServices(services, isUnlocked);
    } else {
      renderServices(DEFAULT_SERVICES, isUnlocked);
    }
  }, function(error) {
    console.error('Erreur chargement services:', error);
    renderServices(DEFAULT_SERVICES, isUnlocked);
  });
}

// ================================================================
// CHARGER UTILISATEUR
// ================================================================
function loadUser(uid) {
  var userRef = doc(db, 'users', uid);
  return getDoc(userRef).then(function(userSnap) {
    if (userSnap.exists()) {
      var data = userSnap.data();
      isUnlocked = data.isUnlocked === true || data.hasDeposited === true;
      localStorage.setItem('ARVEXA_user_data', JSON.stringify(data));
      sessionStorage.setItem('arvexa_loaded', 'true');
    }
    return null;
  }).catch(function(error) {
    console.error('Erreur chargement utilisateur:', error);
    return null;
  });
}

// ================================================================
// NOTIFICATIONS FCM
// ================================================================
async function setupFCMNotifications() {
  try {
    if (Notification.permission === 'granted') {
      var token = await getToken(messaging, { vapidKey: VAPID_KEY });
      if (currentUser) {
        var userRef = doc(db, 'users', currentUser.uid);
        await updateDoc(userRef, { fcmToken: token, notificationsEnabled: true });
      }
      notifBadge.className = 'notif-badge';
      notifStatusText.textContent = '🔔';
      if (notifPermissionBanner) notifPermissionBanner.style.display = 'none';
      return token;
    }
    
    if (Notification.permission === 'denied') {
      notifBadge.className = 'notif-badge';
      notifStatusText.textContent = '🔕';
      if (notifPermissionBanner) notifPermissionBanner.style.display = 'none';
      return null;
    }
    
    notifBadge.className = 'notif-badge';
    notifStatusText.textContent = '🔔';
    if (notifPermissionBanner) notifPermissionBanner.style.display = 'flex';
    return null;
  } catch (error) {
    console.error('❌ Erreur FCM:', error);
    return null;
  }
}

if (enableNotifBtn) {
  enableNotifBtn.addEventListener('click', async function() {
    try {
      var permission = await Notification.requestPermission();
      if (permission === 'granted') {
        var token = await getToken(messaging, { vapidKey: VAPID_KEY });
        if (currentUser) {
          var userRef = doc(db, 'users', currentUser.uid);
          await updateDoc(userRef, { fcmToken: token, notificationsEnabled: true });

        notifStatusText.textContent = '🔔';

      }
    } catch (error) {
      console.error('❌ Erreur permission:', error);
    }
  });
}

onAuthStateChanged(auth, function(user) {
  if (user) {
    currentUser = user;
    localStorage.setItem('ARVEXA_current_user', user.uid);
    
    var cached = localStorage.getItem('ARVEXA_user_data');
    if (cached) {
      try {
        var data = JSON.parse(cached);
        isUnlocked = data.isUnlocked === true || data.hasDeposited === true;
      } catch(e) {}
    }
    
    loadUser(user.uid).then(function() {
      return initializeServices();
    }).then(function() {
      loadServices();
      setupFCMNotifications();
    });
    
    authChecked = true;
  } else {
    var saved = localStorage.getItem('ARVEXA_current_user');
    if (saved && !authChecked) {
      setTimeout(function() {
        if (!auth.currentUser) {
          window.location.href = 'login.html';
        }
      }, 2000);
    } else if (!authChecked) {
      window.location.href = 'login.html';
    }
    authChecked = true;
  }
});

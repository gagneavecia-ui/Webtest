<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="description" content="ARVEXA - Tous les services">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #1A3A2A;
      --primary-dark: #0A1A12;
      --primary-light: #2A5A3A;
      --accent: #B8860B;
      --accent-dim: rgba(184, 134, 11, 0.08);
      --success: #2D7D5A;
      --bg-dark: #0A0A0A;
      --bg-surface: #141414;
      --bg-card: rgba(20, 20, 20, 0.7);
      --text-light: #F5F0E8;
      --text-dim: #8A8A7A;
      --text-muted: #5A5A4A;
      --card-border: rgba(184, 134, 11, 0.06);
      --glass-bg: rgba(26, 58, 42, 0.15);
      --glass-border: rgba(184, 134, 11, 0.04);
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
      --danger: #8A3A3A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      opacity: 0;
      animation: pageFadeIn 0.5s ease forwards;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 80px;
    }

    @keyframes pageFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 40% 30% at 30% 20%, rgba(26, 58, 42, 0.10) 0%, transparent 70%),
                  linear-gradient(180deg, #0A0A0A 0%, #060606 100%);
      pointer-events: none;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.15;
      animation: glowMove 10s ease-in-out infinite alternate;
    }
    .glow-1 { width: 350px; height: 350px; background: rgba(26, 58, 42, 0.15); top: -80px; right: -80px; }
    .glow-2 { width: 200px; height: 200px; background: rgba(184, 134, 11, 0.03); bottom: 0; left: 0; animation-delay: -4s; }
    .glow-3 { width: 250px; height: 250px; background: rgba(26, 58, 42, 0.08); top: 40%; left: 50%; transform: translate(-50%, -50%); animation-delay: -8s; }
    @keyframes glowMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -20px) scale(1.1); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5%;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(184, 134, 11, 0.04);
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--text-light);
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      letter-spacing: 2px;
    }
    .logo span { color: var(--accent); font-style: italic; }

    .back-btn {
      width: clamp(32px, 4vw, 40px);
      height: clamp(32px, 4vw, 40px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:active {
      transform: scale(0.94);
      background: rgba(184, 134, 11, 0.08);
    }
    .back-btn i { font-size: clamp(14px, 1.8vw, 18px); }

    .header-placeholder {
      width: clamp(32px, 4vw, 40px);
      flex-shrink: 0;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px 5% 40px;
      width: 100%;
    }

    .hero-section {
      margin-bottom: 28px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(184, 134, 11, 0.03);
      border: 1px solid rgba(184, 134, 11, 0.04);
      border-radius: 30px;
      padding: 3px 12px;
      margin-bottom: 14px;
    }
    .hero-badge span {
      color: var(--text-dim);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .hero-badge i { color: var(--accent); font-size: 8px; }
    .hero-title {
      font-size: clamp(28px, 5vw, 36px);
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      line-height: 1.2;
      margin-bottom: 10px;
      color: var(--text-light);
    }
    .hero-title span { color: var(--accent); font-style: italic; }
    .hero-description {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 300;
    }

    .section-header {
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .section-header-left {
      border-left: 2px solid var(--accent);
      padding-left: 10px;
    }
    .section-subtitle {
      color: var(--accent);
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.5;
    }
    .section-title {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 600;
      font-family: 'Playfair Display', 'Georgia', serif;
      color: var(--text-light);
    }
    .section-title span { color: var(--accent); font-style: italic; }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .service-card {
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px 14px;
      text-align: center;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      opacity: 0;
      animation: fadeInUp 0.5s ease forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
    }
    .service-card:nth-child(1) { animation-delay: 0.05s; }
    .service-card:nth-child(2) { animation-delay: 0.10s; }
    .service-card:nth-child(3) { animation-delay: 0.15s; }
    .service-card:nth-child(4) { animation-delay: 0.20s; }
    .service-card:nth-child(5) { animation-delay: 0.25s; }
    .service-card:nth-child(6) { animation-delay: 0.30s; }
    .service-card:nth-child(7) { animation-delay: 0.35s; }
    .service-card:nth-child(8) { animation-delay: 0.40s; }
    .service-card:nth-child(9) { animation-delay: 0.45s; }
    .service-card:nth-child(10) { animation-delay: 0.50s; }
    .service-card:nth-child(11) { animation-delay: 0.55s; }
    .service-card:nth-child(12) { animation-delay: 0.60s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .service-card:active { transform: scale(0.96); }
    .service-card:hover {
      border-color: rgba(184, 134, 11, 0.10);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }
    .service-card:hover .icon { transform: scale(1.05); }

    .service-card .icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      margin-bottom: 6px;
      transition: transform 0.3s ease;
    }
    .service-card .icon.gold { background: rgba(184, 134, 11, 0.06); color: var(--accent); }
    .service-card .icon.green { background: rgba(45, 125, 90, 0.06); color: var(--success); }
    .service-card .icon.blue { background: rgba(26, 58, 42, 0.15); color: #4A7A6A; }
    .service-card .icon.purple { background: rgba(139, 63, 232, 0.06); color: #8B3FE8; }
    .service-card .icon.orange { background: rgba(212, 160, 23, 0.06); color: #D4A017; }
    .service-card .icon.red { background: rgba(138, 58, 58, 0.06); color: #8A3A3A; }
    .service-card .icon.teal { background: rgba(20, 184, 166, 0.06); color: #14B8A6; }
    .service-card .icon.indigo { background: rgba(99, 102, 241, 0.06); color: #6366F1; }
    .service-card .icon.pink { background: rgba(236, 72, 153, 0.06); color: #EC4899; }

    .service-card .name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
    }
    .service-card .desc {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 300;
      line-height: 1.3;
    }
    .service-card .badge {
      font-size: 9px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 6px;
    }
    .service-card .badge.premium {
      background: rgba(184, 134, 11, 0.10);
      color: var(--accent);
      border: 1px solid rgba(184, 134, 11, 0.15);
    }
    .service-card .badge.coming {
      background: rgba(138, 58, 58, 0.08);
      color: #8A3A3A;
      border: 1px solid rgba(138, 58, 58, 0.10);
    }

    .service-card .premium-lock {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 14px;
      color: var(--accent);
      opacity: 0.5;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      max-width: 90%;
      width: 400px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #0D2A1F; border: 1px solid #2D7D5A; color: #2D7D5A; }
    .toast.error { background: #2A0D0D; border: 1px solid #8A3A3A; color: #8A3A3A; }
    .toast.warning { background: #2A1A0D; border: 1px solid #B8860B; color: #B8860B; }
    .toast.info { background: #0D1A2A; border: 1px solid #4A7A8A; color: #4A7A8A; }

    @media (max-width: 480px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .service-card {
        padding: 14px 10px;
      }
      .service-card .icon {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }
      .service-card .name { font-size: 12px; }
      .service-card .desc { font-size: 10px; }
      .container { padding: 12px 4% 30px; }
    }

    @media (min-width: 601px) and (max-width: 768px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
    }

    @media (min-width: 769px) {
      .container {
        max-width: 850px;
        padding: 24px 5%;
      }
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
    }

    @media (min-width: 1024px) {
      .container {
        max-width: 1050px;
        padding: 32px 5%;
      }
      .services-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
      }
    }
  </style>
</head>

<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js"

<script type="module">
// ================================================================
// IMPORTS FIREBASE
// ================================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  setPersistence, 
  browserLocalPersistence 
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { 
  getFirestore, 
  doc, 
  getDoc, 
  getDocs, 
  collection, 
  query, 
  orderBy, 
  onSnapshot, 
  setDoc,
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// ================================================================
// FIREBASE CONFIG
// ================================================================
const firebaseConfig = {
  apiKey: "AIzaSyBEbYuuUlNCLMBUHClv4UnyownNHw2q3_g",
  authDomain: "nexgen-39043.firebaseapp.com",
  projectId: "nexgen-39043",
  storageBucket: "nexgen-39043.firebasestorage.app",
  messagingSenderId: "619390144325",
  appId: "1:619390144325:web:35d96b125501e4e8b1782c",
  measurementId: "G-HC2Q5DNKDR"
};

// ================================================================
// INITIALISATION
// ================================================================
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
setPersistence(auth, browserLocalPersistence);

// ================================================================
// DOM ÉLÉMENTS
// ================================================================
const servicesGrid = document.getElementById('servicesGrid');
const comingSoonGrid = document.getElementById('comingSoonGrid');
const comingSoonHeader = document.getElementById('comingSoonHeader');
const toast = document.getElementById('toast');

// ================================================================
// ÉTAT GLOBAL
// ================================================================
let isUnlocked = false;
let servicesData = [];

// ================================================================
// 🚀 CACHE SESSION - CLÉ POUR LA RAPIDITÉ
// ================================================================
const SESSION_LOADED = sessionStorage.getItem('arvexa_services_loaded');
const SESSION_UID = sessionStorage.getItem('arvexa_session_uid');

// ================================================================
// FONCTIONS DE CACHE
// ================================================================
function cacheServices(data) {
  localStorage.setItem('ARVEXA_services_data', JSON.stringify(data));
}

function getCachedServices() {
  const cached = localStorage.getItem('ARVEXA_services_data');
  return cached ? JSON.parse(cached) : null;
}

function cacheUserData(data) {
  localStorage.setItem('ARVEXA_user_data', JSON.stringify(data));
}

function getCachedUserData() {
  const cached = localStorage.getItem('ARVEXA_user_data');
  return cached ? JSON.parse(cached) : null;
}

// ================================================================
// TOAST
// ================================================================
function showToast(message, type = 'info') {
  toast.textContent = message;
  toast.className = `toast ${type}`;
  setTimeout(() => toast.classList.add('show'), 50);
  setTimeout(() => toast.classList.remove('show'), 4000);
}

// ================================================================
// DONNÉES PAR DÉFAUT - SERVICES
// ================================================================
const DEFAULT_SERVICES = [
  { id: 'service_001', name: 'E-books', icon: 'fa-book', iconClass: 'blue', description: 'Lisez et apprenez à votre rythme', page: 'ebooks.html', isPremium: true, isComing: false, order: 1 },
  { id: 'service_002', name: 'Formations', icon: 'fa-graduation-cap', iconClass: 'purple', description: 'Cours vidéo pour maîtriser la finance', page: 'formations.html', isPremium: true, isComing: false, order: 2 },
  { id: 'service_003', name: 'Achat', icon: 'fa-shopping-cart', iconClass: 'gold', description: 'E-books, formations et services', page: 'boutique.html', isPremium: true, isComing: false, order: 3 },
  { id: 'service_004', name: 'Investir', icon: 'fa-chart-line', iconClass: 'gold', description: "Packs d'investissement avec rendements", page: 'investir.html', isPremium: true, isComing: false, order: 4 },
  { id: 'service_005', name: 'Vendre', icon: 'fa-store', iconClass: 'green', description: 'Monétisez vos compétences', page: 'vendre.html', isPremium: true, isComing: false, order: 5 },
  { id: 'service_006', name: 'Parrainage', icon: 'fa-users', iconClass: 'gold', description: 'Gagnez jusqu\'à 500 FCFA par filleul', page: 'parrainage.html', isPremium: true, isComing: false, order: 6 },
  { id: 'service_007', name: 'Recharger', icon: 'fa-plus-circle', iconClass: 'green', description: 'Alimentez votre compte ARVEXA', page: 'recharger.html', isPremium: false, isComing: false, order: 7 },
  { id: 'service_008', name: 'Retrait', icon: 'fa-arrow-down', iconClass: 'red', description: 'Retirez vos gains en toute sécurité', page: 'retrait.html', isPremium: true, isComing: false, order: 8 },
  { id: 'service_009', name: 'Forum', icon: 'fa-comments', iconClass: 'blue', description: 'Échangez avec la communauté', page: 'forum.html', isPremium: true, isComing: false, order: 9 },
  { id: 'service_010', name: 'Mon Activité', icon: 'fa-chart-pie', iconClass: 'purple', description: 'Suivez vos performances en temps réel', page: 'activite.html', isPremium: false, isComing: false, order: 10 }
];

// ================================================================
// AFFICHAGE IMMÉDIAT DU CONTENU
// ================================================================
function showContentImmediately() {
  document.body.style.opacity = '1';
}

// ================================================================
// RENDRE UNE CARTE SERVICE
// ================================================================
function renderServiceCard(service, unlocked) {
  const isPremium = service.isPremium || false;
  const isComing = service.isComing || false;
  
  let badgeText = '';
  let badgeClass = '';
  
  if (isComing) {
    badgeText = '🔜 À venir';
    badgeClass = 'coming';
  } else if (isPremium && !unlocked) {
    badgeText = '🔒 Premium';
    badgeClass = 'premium';
  }

  const showLock = isPremium && !unlocked && !isComing;

  return `
    <a href="${service.page || '#'}" class="service-card" style="animation-delay: ${(service.order || 0) * 0.05}s;">
      ${showLock ? '<span class="premium-lock"><i class="fas fa-lock"></i></span>' : ''}
      <div class="icon ${service.iconClass || 'blue'}"><i class="fas ${service.icon || 'fa-circle'}"></i></div>
      <div class="name">${service.name || 'Service'}</div>
      <div class="desc">${service.description || ''}</div>
      ${badgeText ? `<span class="badge ${badgeClass}">${badgeText}</span>` : ''}
    </a>
  `;
}

// ================================================================
// AFFICHER LES SERVICES
// ================================================================
function renderServices(services, unlocked) {
  const available = services.filter(s => !s.isComing).sort((a, b) => (a.order || 0) - (b.order || 0));
  const coming = services.filter(s => s.isComing).sort((a, b) => (a.order || 0) - (b.order || 0));
  
  servicesGrid.innerHTML = available.map(s => renderServiceCard(s, unlocked)).join('');

  if (coming.length > 0) {
    comingSoonHeader.style.display = 'block';
    comingSoonGrid.innerHTML = coming.map(s => renderServiceCard(s, unlocked)).join('');
  } else {
    comingSoonHeader.style.display = 'none';
    comingSoonGrid.innerHTML = '';
  }
}

// ================================================================
// INITIALISER LES SERVICES (UNE SEULE FOIS)
// ================================================================
let servicesInitialized = false;

async function initializeServices() {
  if (servicesInitialized) return true;
  
  try {
    const servicesRef = collection(db, 'services');
    const snapshot = await getDocs(servicesRef);
    
    if (snapshot.empty) {
      console.log('📝 Création des services par défaut...');
      for (const service of DEFAULT_SERVICES) {
        const docRef = doc(db, 'services', service.id);
        await setDoc(docRef, { ...service, _createdAt: serverTimestamp() });
      }
      console.log('✅ Services créés');
    }
    
    servicesInitialized = true;
    return true;
  } catch (error) {
    console.error('❌ Erreur initialisation services:', error);
    return false;
  }
}

// ================================================================
// CHARGER LES SERVICES DEPUIS FIRESTORE (UNE SEULE FOIS)
// ================================================================
let servicesLoaded = false;

function loadServices() {
  // Si déjà chargés, ne pas refaire la requête
  if (servicesLoaded) return;
  
  const q = query(collection(db, 'services'), orderBy('order', 'asc'));
  
  return onSnapshot(q, (snapshot) => {
    const services = [];
    snapshot.forEach(doc => {
      services.push({ id: doc.id, ...doc.data() });
    });
    
    servicesData = services;
    cacheServices(services);
    
    if (services.length > 0) {
      renderServices(services, isUnlocked);
    } else {
      renderServices(DEFAULT_SERVICES, isUnlocked);
    }
    
    servicesLoaded = true;
    console.log('✅ Services chargés:', services.length);
    
  }, (error) => {
    console.error('❌ Erreur chargement services:', error);
    const cached = getCachedServices();
    if (cached) {
      renderServices(cached, isUnlocked);
    } else {
      renderServices(DEFAULT_SERVICES, isUnlocked);
    }
  });
}

// ================================================================
// CHARGER UTILISATEUR
// ================================================================
async function loadUser(uid) {
  try {
    const userRef = doc(db, 'users', uid);
    const userSnap = await getDoc(userRef);
    if (userSnap.exists()) {
      const data = userSnap.data();
      isUnlocked = data.isUnlocked === true || data.hasDeposited === true;
      cacheUserData(data);
      return data;
    }
    return null;
  } catch (error) {
    console.error('❌ Erreur chargement utilisateur:', error);
    return null;
  }
}

// ================================================================
// AUTHENTIFICATION AVEC CACHE SESSION 🔥
// ================================================================
onAuthStateChanged(auth, async (user) => {
  if (user) {
    localStorage.setItem('ARVEXA_current_user', user.uid);
    
    // 🔥 SI DÉJÀ CHARGÉ PENDANT CETTE SESSION → AFFICHAGE INSTANTANÉ
    if (SESSION_LOADED === 'true' && SESSION_UID === user.uid) {
      console.log("⚡ Chargement instantané depuis cache session - Services");
      
      showContentImmediately();
      
      // Charger depuis localStorage
      const cachedUser = getCachedUserData();
      if (cachedUser) {
        isUnlocked = cachedUser.isUnlocked === true || cachedUser.hasDeposited === true;
      }
      
      const cachedServices = getCachedServices();
      if (cachedServices) {
        renderServices(cachedServices, isUnlocked);
      } else {
        // Si pas de cache, charger (mais en arrière-plan)
        setTimeout(() => {
          initializeServices();
          loadServices();
        }, 100);
      }
      
      // Mise à jour en arrière-plan
      setTimeout(() => {
        if (auth.currentUser) {
          loadUser(user.uid);
          if (!servicesLoaded) {
            initializeServices();
            loadServices();
          }
        }
      }, 200);
      
      return;
    }
    
    // ===== PREMIER CHARGEMENT DE LA SESSION =====
    console.log("🔄 Premier chargement de la session - Services");
    
    showContentImmediately();
    
    // Charger l'utilisateur
    await loadUser(user.uid);
    
    // Initialiser et charger les services
    await initializeServices();
    loadServices();
    
    // Marquer la session comme chargée
    sessionStorage.setItem('arvexa_services_loaded', 'true');
    sessionStorage.setItem('arvexa_session_uid', user.uid);
    
  } else {
    const savedUid = localStorage.getItem('ARVEXA_current_user');
    if (savedUid) {
      setTimeout(() => {
        if (!auth.currentUser) {
          window.location.href = 'login.html';
        }
      }, 2000);
    } else {
      window.location.href = 'login.html';
    }
  }
});

console.log("🛠️ ARVEXA - Page des services optimisée avec cache session");
</script>

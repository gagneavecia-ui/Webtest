<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="description" content="ARVEXA - Connexion à votre compte">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png" type="image/png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* ===== ROOT ===== */
    :root {
      --primary: #1A3A2A;
      --primary-dark: #0A1A12;
      --primary-light: #2A5A3A;
      --accent: #B8860B;
      --accent-dim: rgba(184, 134, 11, 0.08);
      --success: #2D7D5A;
      --bg-dark: #0A0A0A;
      --bg-surface: #141414;
      --bg-card: rgba(20, 20, 20, 0.7);
      --text-light: #F5F0E8;
      --text-dim: #8A8A7A;
      --text-muted: #5A5A4A;
      --card-border: rgba(184, 134, 11, 0.06);
      --glass-bg: rgba(26, 58, 42, 0.15);
      --glass-border: rgba(184, 134, 11, 0.04);
      --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
      --danger: #8A3A3A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      opacity: 0;
      animation: pageFadeIn 0.5s ease forwards;
      -webkit-overflow-scrolling: touch;
    }

    @keyframes pageFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ===== BACKGROUND ===== */
    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 40% 30% at 30% 20%, rgba(26, 58, 42, 0.12) 0%, transparent 70%),
                  radial-gradient(ellipse 30% 20% at 70% 80%, rgba(184, 134, 11, 0.02) 0%, transparent 60%),
                  linear-gradient(180deg, #0A0A0A 0%, #060606 100%);
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.15;
      animation: glowMove 10s ease-in-out infinite alternate;
    }
    .glow-1 { width: 350px; height: 350px; background: rgba(26,58,42,0.15); top: -80px; right: -80px; }
    .glow-2 { width: 200px; height: 200px; background: rgba(184,134,11,0.03); bottom: 0; left: 0; animation-delay: -4s; }
    .glow-3 { width: 250px; height: 250px; background: rgba(26,58,42,0.08); top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }
    @keyframes glowMove {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px,-20px) scale(1.1); }
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-decoration: none;
    }
    .logo-text span {
      color: var(--accent);
      font-style: italic;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .register-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      padding: 6px 14px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      transition: var(--transition);
    }
    .register-link:active {
      transform: scale(0.96);
    }
    .register-link:hover {
      border-color: rgba(184, 134, 11, 0.1);
      color: var(--text-light);
    }

    .back-btn {
      width: clamp(32px, 4vw, 40px);
      height: clamp(32px, 4vw, 40px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:active {
      transform: scale(0.94);
      background: rgba(184, 134, 11, 0.08);
    }
    .back-btn i {
      font-size: clamp(14px, 1.8vw, 18px);
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 30px 16px 40px;
      width: 100%;
      flex: 1;
    }

    /* ===== CARD ===== */
    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 32px 24px;
      animation: fadeInUp 0.6s ease-out;
      box-shadow: var(--shadow);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-header h1 {
      font-size: 26px;
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      color: var(--text-light);
    }
    .login-header h1 span {
      color: var(--accent);
      font-style: italic;
    }
    .login-header p {
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 300;
      margin-top: 4px;
    }

    /* ===== MESSAGES ===== */
    .message-banner {
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-banner.error {
      background: rgba(184, 134, 11, 0.1);
      border: 1px solid rgba(184, 134, 11, 0.2);
      color: var(--accent);
    }
    .message-banner.success {
      background: rgba(45, 125, 90, 0.1);
      border: 1px solid rgba(45, 125, 90, 0.2);
      color: var(--success);
    }
    .message-banner.warning {
      background: rgba(184, 134, 11, 0.08);
      border: 1px solid rgba(184, 134, 11, 0.15);
      color: #D4A017;
    }
    .hidden { display: none; }

    /* ===== FORM ===== */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(10, 10, 10, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      transition: var(--transition);
    }
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.08);
    }
    .input-wrapper .icon-left {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
      z-index: 2;
    }
    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 44px;
      background: transparent;
      border: none;
      color: var(--text-light);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .input-wrapper input::placeholder {
      color: var(--text-muted);
      opacity: 0.5;
    }
    .input-wrapper .toggle-password {
      position: absolute;
      right: 14px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      z-index: 2;
    }
    .input-wrapper .toggle-password:hover {
      color: var(--accent);
    }

    /* ===== FORGOT PASSWORD ===== */
    .forgot-password {
      text-align: right;
      margin: -8px 0 18px;
    }
    .forgot-password a {
      color: var(--text-muted);
      font-size: 12px;
      text-decoration: none;
      transition: var(--transition);
    }
    .forgot-password a:hover {
      color: var(--accent);
    }

    /* ===== SOCIAL BUTTONS ===== */
    .social-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 18px;
    }
    .social-divider::before,
    .social-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.15;
    }
    .social-divider span {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .social-btn {
      width: 100%;
      padding: 12px;
      background: rgba(10, 10, 10, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text-light);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: inherit;
    }
    .social-btn:active {
      transform: scale(0.98);
    }
    .social-btn:hover {
      border-color: rgba(184, 134, 11, 0.15);
      background: rgba(10, 10, 10, 0.8);
    }
    .social-btn.google {
      background: #ffffff;
      border: 1px solid #dadce0;
      color: #3c4043;
    }
    .social-btn.google:hover {
      background: #f8f8f8;
      border-color: #c9c9c9;
    }
    .social-btn.google .google-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ===== SUBMIT ===== */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: var(--bg-dark);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
    }
    .submit-btn:active {
      transform: scale(0.97);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .submit-btn .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--bg-dark);
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .register-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .register-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    /* ============================================================
       TOAST
       ============================================================ */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      max-width: 90%;
      width: 400px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    .toast.success {
      background: #0D2A1F;
      border: 1px solid #2D7D5A;
      color: #2D7D5A;
    }
    .toast.error {
      background: #2A0D0D;
      border: 1px solid #8A3A3A;
      color: #8A3A3A;
    }
    .toast.warning {
      background: #2A1A0D;
      border: 1px solid #B8860B;
      color: #B8860B;
    }
    .toast.info {
      background: #0D1A2A;
      border: 1px solid #4A7A8A;
      color: #4A7A8A;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 480px) {
      .login-card {
        padding: 20px 16px;
      }
      .login-header h1 {
        font-size: 22px;
      }
      .container {
        padding: 20px 12px 30px;
      }
      .header-actions .register-link {
        font-size: 11px;
        padding: 4px 10px;
      }
    }

    @media (min-width: 768px) {
      .container {
        max-width: 550px;
        padding: 50px 5%;
      }
      .login-card {
        padding: 40px 36px;
      }
    }

    @media (min-width: 1024px) {
      .container {
        max-width: 600px;
      }
      .login-card {
        padding: 48px 44px;
      }
    }
  </style>
</head>

<!-- ===== HEADER ===== -->
<header class="header">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>

  <div class="header-actions">
    <a href="register.html" class="register-link"><i class="fas fa-user-plus"></i> Inscription</a>
  </div>

<!-- ===== MAIN ===== -->
<main class="container">
  <div class="login-card">
    <div class="login-header">
      <h1>Bienvenue <span>sur ARVEXA</span></h1>
      <p>Connectez-vous à votre compte</p>
    </div>

    <!-- MESSAGE BANNER -->
    <div id="messageBanner" class="message-banner hidden">
      <i id="messageIcon" class="fas fa-info-circle"></i>
      <span id="messageText"></span>
    </div>

    <!-- FORM -->
    <form id="loginForm">
      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope icon-left"></i>
          <input type="email" id="email" placeholder="exemple@email.com" autocomplete="email" required>
        </div>
      </div>

      <!-- Mot de passe -->
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrapper">
          <i class="fas fa-lock icon-left"></i>
          <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password" required>
          <i class="fas fa-eye toggle-password" id="togglePassword"></i>
        </div>
      </div>

      <!-- Mot de passe oublié -->
      <div class="forgot-password">
        <a href="#" id="forgotPasswordBtn"><i class="fas fa-key"></i> Mot de passe oublié ?</a>
      </div>

      <!-- Bouton connexion -->
      <button type="submit" class="submit-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Se connecter
      </button>

      <!-- Divider social -->
      <div class="social-divider">
        <span>ou</span>
      </div>

      <!-- Google button -->
      <button type="button" class="social-btn google" id="googleBtn">
        <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/>
          <path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/>
          <path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z"/>
          <path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/>
        </svg>
        Se connecter avec Google
      </button>
    </form>

    <div class="register-footer">
      Pas encore de compte ? <a href="register.html">Inscrivez-vous</a>
    </div>
  </div>
</main>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

// ================================================================
// TOAST
// ================================================================
function showToast(message, type) {
  type = type || 'info';
  if (!toast) return;
  toast.textContent = message;
  toast.className = 'toast ' + type;
  setTimeout(function() {
    toast.classList.add('show');
  }, 50);
  setTimeout(function() {
    toast.classList.remove('show');
  }, 4000);
}

// ================================================================
// MESSAGE
// ================================================================
function showMessage(text, type) {
  type = type || 'error';
  messageBanner.className = 'message-banner ' + type;
  messageIcon.className = type === 'error' ? 'fas fa-exclamation-circle' : 
                         (type === 'success' ? 'fas fa-check-circle' : 'fas fa-info-circle');
  messageText.textContent = text;
  messageBanner.classList.remove('hidden');
  if (type === 'success') {
    setTimeout(function() {
      messageBanner.classList.add('hidden');
    }, 5000);
  }
}

function hideMessage() {
  messageBanner.classList.add('hidden');
}

// ================================================================
// TRANSLATE FIRESTORE ERROR
// ================================================================
function translateFirestoreError(error) {
  var code = error && error.code ? error.code : '';
  var msg = error && error.message ? error.message : '';
  
  if (code === 'permission-denied') {
    return "⛔ Permission refusée. Vérifiez vos accès.";
  }
  if (code === 'unavailable') {
    return "📶 Service indisponible. Vérifiez votre connexion Internet.";
  }
  if (code === 'deadline-exceeded' || code === 'cancelled') {
    return "⏱️ Délai dépassé. Réessayez.";
  }
  if (code === 'not-found') {
    return "⚠️ Document introuvable.";
  }
  if (code === 'resource-exhausted') {
    return "🚫 Quota atteint. Réessayez plus tard.";
  }
  if (code === 'unauthenticated') {
    return "🔒 Vous devez être connecté pour effectuer cette action.";
  }
  return "❌ Erreur : " + msg;
}

// ================================================================
// REDIRECTION SI DÉJÀ CONNECTÉ
// ================================================================
// ✅ CORRECTION 1: Vérifier isLoggingIn pour éviter la redirection pendant la connexion
onAuthStateChanged(auth, function(user) {
  if (user && !isLoggingIn) {
    localStorage.setItem('ARVEXA_current_user', user.uid);
    window.location.href = 'index.html';
  } else if (user && isLoggingIn) {
    console.log("⏳ Connexion en cours, redirection suspendue");
  }
});

// TOGGLE PASSWORD
// ================================================================
togglePassword.addEventListener('click', function() {
  var type = passwordInput.type === 'password' ? 'text' : 'password';
  passwordInput.type = type;
  togglePassword.classList.toggle('fa-eye');
  togglePassword.classList.toggle('fa-eye-slash');

// ================================================================
// CRÉER DOCUMENT UTILISATEUR (pour Google)
// ================================================================
function createUserDocument(user, displayName, email) {
  var now = new Date().toISOString();
  var nameParts = displayName ? displayName.split(' ') : ['Utilisateur', 'Google'];
  var prenom = nameParts[0] || 'Utilisateur';
  var nom = nameParts.slice(1).join(' ') || 'Google';
  
  // Générer un code de parrainage
  var uid = user.uid;
  var p = (prenom || 'USER').substring(0, 3).toUpperCase();
  var n = (nom || '').substring(0, 3).toUpperCase();
  var base = (p + n + uid.substring(0, 4)).toUpperCase().replace(/[^A-Z0-9]/g, '');
  var referralCode = base.length >= 4 ? base.substring(0, 8) : base + uid.substring(0, 4);
  if (referralCode.length < 4) referralCode = referralCode + Math.random().toString(36).substring(2, 6).toUpperCase();
  
  var userData = {
    uid: uid,
    email: email || user.email,
    nom: nom,
    prenom: prenom,
    fullName: displayName || (prenom + ' ' + nom),
    pays: "Niger",
    phone: user.phoneNumber || "",
    howKnown: 'google',
    balance: 0,
    realBalance: 0,
    totalDepots: 0,
    totalRetraits: 0,
    totalAchats: 0,
    totalVentes: 0,
    totalRevenus: 0,
    gainsTotal: 0,
    investments: [],
    achats: [],
    epargnes: [],
    referralsCount: 0,
    referralEarnings: 0,
    referralCode: referralCode,
    referredBy: null,
    referralBonusPending: false,
    referralBonusAmount: 0,
    referralBonusReceived: false,
    status: "active",
    role: "user",
    hasDeposited: false,
    isUnlocked: false,
    registrationDate: now,
    createdAt: now,
    lastLogin: now,
    emailVerified: user.emailVerified || false,
    _serverCreatedAt: serverTimestamp()
  };
  
  // Créer le document utilisateur
  var userRef = doc(db, "users", uid);
  return setDoc(userRef, userData, { merge: true }).then(function() {
    // Créer le mapping du code de parrainage
    var codeRef = doc(db, "referralCodes", referralCode);
    return setDoc(codeRef, {
      uid: uid,
      createdAt: now
    });
  }).then(function() {
    console.log("✅ Document Google créé pour:", uid);
    return userData;
  });
}

// ================================================================
// CONNEXION
// ================================================================
loginForm.addEventListener('submit', function(e) {
  e.preventDefault();
  hideMessage();

  var email = emailInput.value.trim();
  var password = passwordInput.value;

  if (!email || !password) {
    showMessage('Veuillez remplir tous les champs.', 'error');
    return;
  }

  // ✅ CORRECTION 5: isLoggingIn = true avant la connexion
  isLoggingIn = true;
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="loader"></span> Connexion...';

  signInWithEmailAndPassword(auth, email, password)
    .then(function(userCredential) {
      var user = userCredential.user;
      console.log("✅ Connexion réussie:", user.uid);
      
      // Vérifier que l'utilisateur existe dans Firestore
      var userRef = doc(db, "users", user.uid);
      return getDoc(userRef).then(function(docSnap) {
        if (!docSnap.exists()) {
          // Si l'utilisateur existe dans Auth mais pas dans Firestore (cas rare)
          // Créer le document avec les infos disponibles
          return createUserDocument(user, user.displayName, user.email).then(function() {
            return userRef;
          });
        }
        return userRef;
      });
    })
    .then(function(userRef) {
      // Mettre à jour lastLogin
      return updateDoc(userRef, {
        lastLogin: new Date().toISOString()
      }).catch(function(err) {
        console.warn("⚠️ Impossible de mettre à jour lastLogin:", err);
      });
    })
    .then(function() {
      showToast('✅ Connexion réussie ! Bienvenue sur ARVEXA. 🎉', 'success');
      
      // Charger les données utilisateur dans localStorage
      var user = auth.currentUser;
      var userRef = doc(db, "users", user.uid);
      return getDoc(userRef);
    })
    .then(function(docSnap) {
      if (docSnap.exists()) {
        var userData = docSnap.data();
        localStorage.setItem('ARVEXA_current_user', user.uid);
        localStorage.setItem('ARVEXA_user_data', JSON.stringify(userData));
        localStorage.setItem('ARVEXA_is_unlocked', String(userData.isUnlocked || false));
      }
      
      setTimeout(function() {
        isLoggingIn = false;
        window.location.href = 'index.html';
      }, 1000);
    })
    .catch(function(error) {
      isLoggingIn = false;
      console.error("❌ Erreur connexion:", error);
      
      // ✅ CORRECTION 3: Messages d'erreur détaillés
      var errorMsg = translateFirestoreError(error);
      
      if (error.code === 'auth/user-not-found') {
        errorMsg = '❌ Aucun compte trouvé avec cet email.';
      } else if (error.code === 'auth/wrong-password') {
        errorMsg = '❌ Mot de passe incorrect.';
      } else if (error.code === 'auth/too-many-requests') {
        errorMsg = '⏳ Trop de tentatives. Réessayez plus tard.';
      } else if (error.code === 'auth/network-request-failed') {
        errorMsg = '📶 Problème réseau. Vérifiez votre connexion Internet.';
      } else if (error.code === 'auth/invalid-email') {
        errorMsg = '❌ Email invalide.';
      } else if (error.code === 'auth/user-disabled') {
        errorMsg = '⛔ Ce compte a été désactivé. Contactez le support.';
      }
      
      showMessage(errorMsg, 'error');
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
    });
});

// ================================================================
// CONNEXION GOOGLE
// ================================================================
if (googleBtn) {
  googleBtn.addEventListener('click', function() {
    // ✅ CORRECTION 5: isLoggingIn = true avant la connexion
    isLoggingIn = true;
    googleBtn.disabled = true;
    googleBtn.innerHTML = '<span class="loader"></span> Connexion...';

    var provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider)
      .then(function(result) {
        var user = result.user;
        console.log("✅ Connexion Google réussie:", user.email);
        
        // ✅ CORRECTION 4: Vérifier/créer le document Firestore
        var userRef = doc(db, "users", user.uid);
        return getDoc(userRef).then(function(docSnap) {
          if (!docSnap.exists()) {
            console.log("📝 Création du document pour Google...");
            return createUserDocument(user, user.displayName, user.email).then(function() {
              return userRef;
            });
          }
          return userRef;
        });
      })
      .then(function(userRef) {
        // Mettre à jour lastLogin
        return updateDoc(userRef, {
          lastLogin: new Date().toISOString()
        }).catch(function(err) {
          console.warn("⚠️ Impossible de mettre à jour lastLogin:", err);
        });
      })
      .then(function() {
        var user = auth.currentUser;
        if (user) {
          localStorage.setItem('ARVEXA_current_user', user.uid);
          
          // Récupérer les données utilisateur
          var userRef = doc(db, "users", user.uid);
          return getDoc(userRef);
        }
        return null;
      })
      .then(function(docSnap) {
        if (docSnap && docSnap.exists()) {
          var userData = docSnap.data();
          localStorage.setItem('ARVEXA_user_data', JSON.stringify(userData));
          localStorage.setItem('ARVEXA_is_unlocked', String(userData.isUnlocked || false));
        }
        
        showToast('✅ Connexion Google réussie !', 'success');
        
        setTimeout(function() {
          isLoggingIn = false;
          window.location.href = 'index.html';
        }, 1000);
      })
      .catch(function(error) {
        isLoggingIn = false;
        console.error("❌ Erreur Google:", error);
        
        var errorMsg = 'Erreur lors de la connexion avec Google.';
        if (error.code === 'auth/popup-closed-by-user') {
          errorMsg = 'Fenêtre popup fermée. Réessayez.';
        } else if (error.code === 'auth/network-request-failed') {
          errorMsg = '📶 Problème réseau. Vérifiez votre connexion.';
        } else if (error.code === 'auth/cancelled-popup-request') {
          errorMsg = '⚠️ Demande annulée. Réessayez.';
        }
        showMessage(errorMsg, 'error');
        googleBtn.disabled = false;
        googleBtn.innerHTML = '<svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z"/><path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/></svg> Se connecter avec Google';
      });
  });
}

// ================================================================
// MOT DE PASSE OUBLIÉ
// ================================================================
forgotPasswordBtn.addEventListener('click', function(e) {
  e.preventDefault();
  
  var email = emailInput.value.trim();
  if (!email) {
    showMessage('Veuillez saisir votre email pour recevoir le lien de réinitialisation.', 'warning');
    emailInput.focus();
    return;
  }
  
  if (!email.includes('@') || !email.includes('.')) {
    showMessage('Email invalide. Veuillez saisir un email valide.', 'error');
    emailInput.focus();
    return;
  }
  
  // Désactiver le bouton temporairement
  forgotPasswordBtn.style.pointerEvents = 'none';
  forgotPasswordBtn.style.opacity = '0.5';
  
  sendPasswordResetEmail(auth, email)
    .then(function() {
      showToast('📧 Un email de réinitialisation a été envoyé à ' + email, 'success');
      showMessage('✅ Vérifiez votre boîte mail pour réinitialiser votre mot de passe.', 'success');
    })
    .catch(function(error) {
      console.error("❌ Erreur réinitialisation:", error);
      var errorMsg = 'Erreur lors de l\'envoi de l\'email.';
      if (error.code === 'auth/user-not-found') {
        errorMsg = '❌ Aucun compte trouvé avec cet email.';
      } else if (error.code === 'auth/network-request-failed') {
        errorMsg = '📶 Problème réseau. Vérifiez votre connexion.';
      } else if (error.code === 'auth/too-many-requests') {
        errorMsg = '⏳ Trop de demandes. Réessayez plus tard.';
      }
      showMessage(errorMsg, 'error');
    })
    .finally(function() {
      // Réactiver le bouton
      setTimeout(function() {
        forgotPasswordBtn.style.pointerEvents = 'auto';
        forgotPasswordBtn.style.opacity = '1';
      }, 3000);
    });
});

// ================================================================
// ENTER KEY pour soumettre le formulaire
// ================================================================
passwordInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    loginForm.dispatchEvent(new Event('submit'));
  }
});

emailInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    passwordInput.focus();
  }
});

// GESTION RÉSEAU

window.addEventListener('online', function() {
  showToast('📶 Connexion Internet rétablie', 'success');
});
window.addEventListener('offline', function() {
  showToast('📶 Connexion Internet perdue', 'error');
});

console.log("🔐 ARVEXA - Page de connexion chargée (version corrigée)");

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="description" content="ARVEXA - Se connecter">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* ===== ROOT ===== */
    :root {
      --primary: #1A3A2A;
      --primary-dark: #0A1A12;
      --primary-light: #2A5A3A;
      --accent: #B8860B;
      --accent-dim: rgba(184, 134, 11, 0.08);
      --success: #2D7D5A;
      --bg-dark: #0A0A0A;
      --bg-surface: #141414;
      --bg-card: rgba(20, 20, 20, 0.7);
      --text-light: #F5F0E8;
      --text-dim: #8A8A7A;
      --text-muted: #5A5A4A;
      --card-border: rgba(184, 134, 11, 0.06);
      --glass-bg: rgba(26, 58, 42, 0.15);
      --glass-border: rgba(184, 134, 11, 0.04);
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      opacity: 0;
      animation: pageFadeIn 0.5s ease forwards;
      -webkit-overflow-scrolling: touch;
    }

    @keyframes pageFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ===== BACKGROUND ===== */
    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 40% 30% at 30% 20%, rgba(26, 58, 42, 0.10) 0%, transparent 70%),
                  linear-gradient(180deg, #0A0A0A 0%, #060606 100%);
      pointer-events: none;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.15;
      animation: glowMove 10s ease-in-out infinite alternate;
    }
    .glow-1 { width: 350px; height: 350px; background: rgba(26,58,42,0.15); top: -80px; right: -80px; }
    .glow-2 { width: 200px; height: 200px; background: rgba(184,134,11,0.03); bottom: 0; left: 0; animation-delay: -4s; }
    .glow-3 { width: 250px; height: 250px; background: rgba(26,58,42,0.08); top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }
    @keyframes glowMove {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px,-20px) scale(1.1); }
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
      width: 100%;
      max-width: 100%;
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--text-light);
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      letter-spacing: 2px;
    }
    .logo span {
      color: var(--accent);
      font-style: italic;
    }

    .back-btn {
      width: clamp(32px, 4vw, 40px);
      height: clamp(32px, 4vw, 40px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:active {
      transform: scale(0.94);
      background: rgba(184, 134, 11, 0.08);
    }
    .back-btn i {
      font-size: clamp(14px, 1.8vw, 18px);
    }

    .header-placeholder {
      width: clamp(32px, 4vw, 40px);
      flex-shrink: 0;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 30px 5% 40px;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== CARD ===== */
    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: clamp(24px, 4vw, 36px);
      width: 100%;
      box-shadow: var(--shadow);
    }

    /* ===== HEADER ===== */
    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-header .icon-big {
      font-size: 40px;
      color: var(--accent);
      margin-bottom: 6px;
      display: block;
    }
    .login-header h1 {
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      color: var(--text-light);
    }
    .login-header h1 span {
      color: var(--accent);
      font-style: italic;
    }
    .login-header p {
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 300;
      margin-top: 4px;
    }

    /* ===== MESSAGES ===== */
    .message-banner {
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-banner.error {
      background: rgba(184, 134, 11, 0.10);
      border: 1px solid rgba(184, 134, 11, 0.20);
      color: var(--accent);
    }
    .message-banner.success {
      background: rgba(45, 125, 90, 0.10);
      border: 1px solid rgba(45, 125, 90, 0.20);
      color: var(--success);
    }
    .message-banner.warning {
      background: rgba(184, 134, 11, 0.08);
      border: 1px solid rgba(184, 134, 11, 0.15);
      color: #D4A017;
    }
    .hidden { display: none; }

    /* ===== FORM ===== */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(10, 10, 10, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.06);
    }
    .input-wrapper .icon-left {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
      z-index: 2;
    }
    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 44px;
      background: transparent;
      border: none;
      color: var(--text-light);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .input-wrapper input::placeholder {
      color: var(--text-muted);
      opacity: 0.5;
    }
    .input-wrapper .toggle-password {
      position: absolute;
      right: 14px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      z-index: 2;
    }
    .input-wrapper .toggle-password:hover {
      color: var(--accent);
    }

    /* ===== FORGOT PASSWORD ===== */
    .forgot-link {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 18px;
    }
    .forgot-link a {
      color: var(--text-muted);
      font-size: 12px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-link a:hover {
      color: var(--accent);
    }

    /* ===== SUBMIT ===== */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: var(--bg-dark);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .submit-btn:active {
      transform: scale(0.97);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .submit-btn .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--bg-dark);
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== SOCIAL ===== */
    .social-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 18px;
    }
    .social-divider::before,
    .social-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.15;
    }
    .social-divider span {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .social-btn {
      width: 100%;
      padding: 12px;
      background: rgba(10, 10, 10, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text-light);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: inherit;
    }
    .social-btn:active {
      transform: scale(0.97);
    }
    .social-btn:hover {
      border-color: rgba(184, 134, 11, 0.15);
      background: rgba(10, 10, 10, 0.8);
    }
    .social-btn.google {
      color: #EA4335;
    }
    .social-btn.google i {
      font-size: 18px;
    }

    /* ===== REGISTER LINK ===== */
    .register-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .register-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    /* ============================================================
       TOAST
       ============================================================ */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      max-width: 90%;
      width: 400px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    .toast.success {
      background: #0D2A1F;
      border: 1px solid #2D7D5A;
      color: #2D7D5A;
    }
    .toast.error {
      background: #2A0D0D;
      border: 1px solid #8A3A3A;
      color: #8A3A3A;
    }
    .toast.warning {
      background: #2A1A0D;
      border: 1px solid #B8860B;
      color: #B8860B;
    }
    .toast.info {
      background: #0D1A2A;
      border: 1px solid #4A7A8A;
      color: #4A7A8A;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 480px) {
      .login-card {
        padding: 20px 16px;
      }
      .login-header h1 {
        font-size: 22px;
      }
      .container {
        padding: 20px 4% 30px;
      }
    }

    @media (min-width: 768px) {
      .container {
        max-width: 600px;
        padding: 40px 5%;
      }
      .login-card {
        padding: 36px 32px;
      }
    }

    @media (min-width: 1024px) {
      .container {
        max-width: 700px;
      }
      .login-card {
        padding: 44px 40px;
      }
    }
  </style>
</head>
<body>

<!-- ===== NETTOYAGE CACHE AU CHARGEMENT ===== -->
<script>
  console.log("🧹 Nettoyage du cache au chargement de login.html");
  sessionStorage.clear();
</script>

<!-- ===== BACKGROUND ===== -->
<div class="gradient-bg"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>

<!-- ===== HEADER ===== -->
<header class="header">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  <a href="index.html" class="logo">ARVE<span>XA</span></a>
  <div class="header-placeholder"></div>
</header>

<!-- ===== MAIN ===== -->
<main class="container">
  <div class="login-card">

    <!-- HEADER -->
    <div class="login-header">
      <span class="icon-big"><i class="fas fa-shield-alt"></i></span>
      <h1>Bienvenue <span>chez</span> ARVEXA</h1>
      <p>Connectez-vous pour accéder à votre portefeuille</p>
    </div>

    <!-- MESSAGE BANNER -->
    <div id="messageBanner" class="message-banner hidden">
      <i id="messageIcon" class="fas fa-info-circle"></i>
      <span id="messageText"></span>
    </div>

    <!-- FORM -->
    <form id="loginForm">
      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope icon-left"></i>
          <input type="email" id="email" placeholder="exemple@email.com" autocomplete="email" required>
        </div>
      </div>

      <!-- Mot de passe -->
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrapper">
          <i class="fas fa-lock icon-left"></i>
          <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password" required>
          <i class="fas fa-eye toggle-password" id="togglePassword"></i>
        </div>
      </div>

      <!-- Mot de passe oublié -->
      <div class="forgot-link">
        <a href="reset-password.html">Mot de passe oublié ?</a>
      </div>

      <!-- Bouton -->
      <button type="submit" class="submit-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Se connecter
      </button>

      <!-- Divider social -->
      <div class="social-divider">
        <span>ou</span>
      </div>

      <!-- Google button -->
      <button type="button" class="social-btn google" id="googleBtn">
        <i class="fab fa-google"></i> Se connecter avec Google
      </button>
    </form>

    <div class="register-footer">
      Pas encore de compte ? <a href="register.html">Inscrivez-vous</a>
    </div>

  </div>
</main>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { 
    getAuth, 
    signInWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    setPersistence,
    browserLocalPersistence,
    onAuthStateChanged
  } from "firebase/auth";

  // ===== FIREBASE CONFIG - NEXGEN =====
  const firebaseConfig = {
    apiKey: "AIzaSyBEbYuuUlNCLMBUHClv4UnyownNHw2q3_g",
    authDomain: "nexgen-39043.firebaseapp.com",
    projectId: "nexgen-39043",
    storageBucket: "nexgen-39043.firebasestorage.app",
    messagingSenderId: "619390144325",
    appId: "1:619390144325:web:35d96b125501e4e8b1782c",
    measurementId: "G-HC2Q5DNKDR"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  
  setPersistence(auth, browserLocalPersistence);

  // ===== ÉLÉMENTS DOM =====
  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const googleBtn = document.getElementById('googleBtn');
  const messageBanner = document.getElementById('messageBanner');
  const messageIcon = document.getElementById('messageIcon');
  const messageText = document.getElementById('messageText');
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  const toast = document.getElementById('toast');

  let authChecked = false;

  // ===== TOAST =====
  function showToast(message, type = 'info') {
    toast.textContent = message;
    toast.className = `toast ${type}`;
    setTimeout(() => toast.classList.add('show'), 50);
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  // ===== MESSAGE BANNER =====
  function showMessage(text, type = 'error') {
    messageBanner.className = `message-banner ${type}`;
    messageIcon.className = type === 'error' ? 'fas fa-exclamation-circle' : 
                           (type === 'success' ? 'fas fa-check-circle' : 'fas fa-info-circle');
    messageText.textContent = text;
    messageBanner.classList.remove('hidden');
    if (type === 'success') {
      setTimeout(() => messageBanner.classList.add('hidden'), 5000);
    }
  }

  function hideMessage() {
    messageBanner.classList.add('hidden');
  }

  // ===== AFFICHER/MASQUER MOT DE PASSE =====
  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    togglePassword.classList.toggle('fa-eye');
    togglePassword.classList.toggle('fa-eye-slash');
  });

  // ===== VÉRIFICATION AUTOMATIQUE DE CONNEXION =====
  onAuthStateChanged(auth, (user) => {
    if (authChecked) return;
    authChecked = true;

    if (user) {
      console.log("✅ Utilisateur déjà connecté:", user.email);
      localStorage.setItem('ARVEXA_current_user', user.uid);
      window.location.href = 'index.html';
    } else {
      console.log("👤 Aucun utilisateur connecté, affichage du formulaire");
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
    }
  });

  // ===== CONNEXION EMAIL / MOT DE PASSE =====
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideMessage();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showMessage('Veuillez remplir tous les champs.', 'error');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="loader"></span> Connexion...';

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      
      console.log("✅ Connexion réussie pour:", user.email);
      showMessage('✅ Connexion réussie ! Redirection...', 'success');
      
      localStorage.setItem('ARVEXA_current_user', user.uid);
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
      
    } catch (error) {
      console.error("❌ Erreur connexion:", error);
      
      let errorMsg = 'Erreur lors de la connexion.';
      switch (error.code) {
        case 'auth/invalid-credential':
        case 'auth/user-not-found':
        case 'auth/wrong-password':
          errorMsg = 'Email ou mot de passe incorrect.';
          break;
        case 'auth/invalid-email':
          errorMsg = 'Email invalide.';
          break;
        case 'auth/user-disabled':
          errorMsg = 'Ce compte a été désactivé.';
          break;
        case 'auth/too-many-requests':
          errorMsg = 'Trop de tentatives. Réessayez plus tard.';
          break;
        default:
          errorMsg = error.message || 'Erreur inconnue.';
      }
      showMessage(errorMsg, 'error');
      
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
    }
  });

  // ===== CONNEXION GOOGLE =====
  googleBtn.addEventListener('click', async () => {
    googleBtn.disabled = true;
    googleBtn.innerHTML = '<span class="loader"></span> Connexion...';

    try {
      const provider = new GoogleAuthProvider();
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      
      console.log("✅ Connexion Google réussie pour:", user.email);
      showMessage('✅ Connexion réussie ! Redirection...', 'success');
      
      localStorage.setItem('ARVEXA_current_user', user.uid);
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
      
    } catch (error) {
      console.error("❌ Erreur Google:", error);
      
      let errorMsg = 'Erreur lors de la connexion avec Google.';
      if (error.code === 'auth/popup-closed-by-user') {
        errorMsg = 'Fenêtre popup fermée. Réessayez.';
      } else if (error.code === 'auth/network-request-failed') {
        errorMsg = 'Erreur réseau. Vérifiez votre connexion.';
      } else if (error.code === 'auth/cancelled-popup-request') {
        errorMsg = 'Connexion annulée. Réessayez.';
      }
      showMessage(errorMsg, 'error');
      
      googleBtn.disabled = false;
      googleBtn.innerHTML = '<i class="fab fa-google"></i> Se connecter avec Google';
    }
  });

  // ===== ENREGISTREMENT DU SERVICE WORKER =====
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(registration => {
          console.log('✅ Service Worker enregistré avec succès:', registration.scope);
        })
        .catch(error => {
          console.log('❌ Échec de l\'enregistrement du Service Worker:', error);
        });
    });
  }

  // ===== GESTION RÉSEAU =====
  window.addEventListener('online', () => showToast('📶 Connexion Internet rétablie', 'success'));
  window.addEventListener('offline', () => showToast('📶 Connexion Internet perdue', 'error'));
</script>
</body>
</html>

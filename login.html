<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="description" content="ARVEXA - Connexion à votre compte">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* ===== ROOT ===== */
    :root {
      --primary: #1A3A2A;
      --primary-dark: #0A1A12;
      --primary-light: #2A5A3A;
      --accent: #B8860B;
      --accent-dim: rgba(184, 134, 11, 0.08);
      --success: #2D7D5A;
      --bg-dark: #0A0A0A;
      --bg-surface: #141414;
      --bg-card: rgba(20, 20, 20, 0.7);
      --text-light: #F5F0E8;
      --text-dim: #8A8A7A;
      --text-muted: #5A5A4A;
      --card-border: rgba(184, 134, 11, 0.06);
      --glass-bg: rgba(26, 58, 42, 0.15);
      --glass-border: rgba(184, 134, 11, 0.04);
      --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
      --danger: #8A3A3A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      opacity: 0;
      animation: pageFadeIn 0.5s ease forwards;
      -webkit-overflow-scrolling: touch;
    }

    @keyframes pageFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ===== BACKGROUND ===== */
    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 40% 30% at 30% 20%, rgba(26, 58, 42, 0.12) 0%, transparent 70%),
                  radial-gradient(ellipse 30% 20% at 70% 80%, rgba(184, 134, 11, 0.02) 0%, transparent 60%),
                  linear-gradient(180deg, #0A0A0A 0%, #060606 100%);
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.15;
      animation: glowMove 10s ease-in-out infinite alternate;
    }
    .glow-1 { width: 350px; height: 350px; background: rgba(26,58,42,0.15); top: -80px; right: -80px; }
    .glow-2 { width: 200px; height: 200px; background: rgba(184,134,11,0.03); bottom: 0; left: 0; animation-delay: -4s; }
    .glow-3 { width: 250px; height: 250px; background: rgba(26,58,42,0.08); top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }
    @keyframes glowMove {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px,-20px) scale(1.1); }
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-decoration: none;
    }
    .logo-text span {
      color: var(--accent);
      font-style: italic;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .register-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      padding: 6px 14px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      transition: var(--transition);
    }
    .register-link:active {
      transform: scale(0.96);
    }
    .register-link:hover {
      border-color: rgba(184, 134, 11, 0.1);
      color: var(--text-light);
    }

    .back-btn {
      width: clamp(32px, 4vw, 40px);
      height: clamp(32px, 4vw, 40px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:active {
      transform: scale(0.94);
      background: rgba(184, 134, 11, 0.08);
    }
    .back-btn i {
      font-size: clamp(14px, 1.8vw, 18px);
    }

    /* ===== BADGE NOTIFICATION ===== */
    .notif-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 10px;
      font-weight: 500;
      transition: var(--transition);
      background: rgba(45, 125, 90, 0.08);
      color: var(--success);
      border: 1px solid rgba(45, 125, 90, 0.10);
    }
    .notif-badge i {
      font-size: 12px;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
    }

    /* ===== CARD ===== */
    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 32px 24px;
      animation: fadeInUp 0.6s ease-out;
      box-shadow: var(--shadow);
      width: 100%;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-header h1 {
      font-size: 26px;
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      color: var(--text-light);
    }
    .login-header h1 span {
      color: var(--accent);
      font-style: italic;
    }
    .login-header p {
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 300;
      margin-top: 4px;
    }

    /* ===== MESSAGES ===== */
    .message-banner {
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-banner.error {
      background: rgba(184, 134, 11, 0.1);
      border: 1px solid rgba(184, 134, 11, 0.2);
      color: var(--accent);
    }
    .message-banner.success {
      background: rgba(45, 125, 90, 0.1);
      border: 1px solid rgba(45, 125, 90, 0.2);
      color: var(--success);
    }
    .message-banner.warning {
      background: rgba(184, 134, 11, 0.08);
      border: 1px solid rgba(184, 134, 11, 0.15);
      color: #D4A017;
    }
    .hidden { display: none; }

    /* ===== FORM ===== */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(10, 10, 10, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      transition: var(--transition);
    }
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.08);
    }
    .input-wrapper .icon-left {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
      z-index: 2;
    }
    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 44px;
      background: transparent;
      border: none;
      color: var(--text-light);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .input-wrapper input::placeholder {
      color: var(--text-muted);
      opacity: 0.5;
    }
    .input-wrapper .toggle-password {
      position: absolute;
      right: 14px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      z-index: 2;
    }
    .input-wrapper .toggle-password:hover {
      color: var(--accent);
    }

    /* ===== FORGOT PASSWORD ===== */
    .forgot-password {
      text-align: right;
      margin-bottom: 18px;
    }
    .forgot-password a {
      color: var(--text-muted);
      font-size: 12px;
      text-decoration: none;
      transition: var(--transition);
    }
    .forgot-password a:hover {
      color: var(--accent);
    }

    /* ===== SOCIAL BUTTONS ===== */
    .social-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 18px;
    }
    .social-divider::before,
    .social-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.15;
    }
    .social-divider span {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .social-btn {
      width: 100%;
      padding: 12px;
      background: rgba(10, 10, 10, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text-light);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: inherit;
    }
    .social-btn:active {
      transform: scale(0.98);
    }
    .social-btn:hover {
      border-color: rgba(184, 134, 11, 0.15);
      background: rgba(10, 10, 10, 0.8);
    }
    .social-btn.google {
      background: #ffffff;
      border: 1px solid #dadce0;
      color: #3c4043;
    }
    .social-btn.google:hover {
      background: #f8f8f8;
      border-color: #c9c9c9;
    }
    .social-btn.google .google-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ===== SUBMIT ===== */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: var(--bg-dark);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
    }
    .submit-btn:active {
      transform: scale(0.97);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .submit-btn .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--bg-dark);
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .register-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .register-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    /* ============================================================
       NOTIFICATION PERMISSION BANNER
       ============================================================ */
    .notif-permission-banner {
      background: rgba(184, 134, 11, 0.06);
      border: 1px solid rgba(184, 134, 11, 0.10);
      border-radius: 12px;
      padding: 12px 16px;
      margin: 18px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .notif-permission-banner p {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .notif-permission-banner p i {
      color: var(--accent);
    }
    .notif-permission-banner .btn-enable {
      padding: 6px 16px;
      background: var(--accent);
      border: none;
      border-radius: 30px;
      color: var(--bg-dark);
      font-weight: 600;
      font-size: 11px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .notif-permission-banner .btn-enable:active {
      transform: scale(0.95);
    }
    .notif-permission-banner .btn-enable:hover {
      background: #9A7209;
    }

    /* ============================================================
       TOAST
       ============================================================ */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      max-width: 90%;
      width: 400px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    .toast.success {
      background: #0D2A1F;
      border: 1px solid #2D7D5A;
      color: #2D7D5A;
    }
    .toast.error {
      background: #2A0D0D;
      border: 1px solid #8A3A3A;
      color: #8A3A3A;
    }
    .toast.warning {
      background: #2A1A0D;
      border: 1px solid #B8860B;
      color: #B8860B;
    }
    .toast.info {
      background: #0D1A2A;
      border: 1px solid #4A7A8A;
      color: #4A7A8A;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 480px) {
      .login-card {
        padding: 20px 16px;
      }
      .login-header h1 {
        font-size: 22px;
      }
      .notif-permission-banner {
        flex-direction: column;
        text-align: center;
      }
    }

    @media (min-width: 768px) {
      .container {
        max-width: 600px;
        padding: 40px 5%;
      }
      .login-card {
        padding: 36px 32px;
      }
    }

    @media (min-width: 1024px) {
      .container {
        max-width: 700px;
      }
      .login-card {
        padding: 44px 40px;
      }
    }
  </style>
</head>
<body>

<!-- ===== BACKGROUND ===== -->
<div class="gradient-bg"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>

<!-- ===== HEADER ===== -->
<header class="header">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  <a href="index.html" class="logo-text">ARVE<span>XA</span></a>
  <div class="header-actions">
    <span class="notif-badge" id="notifBadge">
      <i class="fas fa-circle"></i> <span id="notifStatusText">🔔</span>
    </span>
    <a href="register.html" class="register-link"><i class="fas fa-user-plus"></i> S'inscrire</a>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main class="container">
  <div class="login-card">
    <div class="login-header">
      <h1>Bienvenue sur <span>ARVEXA</span></h1>
      <p>Connectez-vous pour accéder à votre espace</p>
    </div>

    <!-- MESSAGE BANNER -->
    <div id="messageBanner" class="message-banner hidden">
      <i id="messageIcon" class="fas fa-info-circle"></i>
      <span id="messageText"></span>
    </div>

    <!-- FORM -->
    <form id="loginForm">
      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope icon-left"></i>
          <input type="email" id="email" placeholder="exemple@email.com" autocomplete="email">
        </div>
      </div>

      <!-- Mot de passe -->
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrapper">
          <i class="fas fa-lock icon-left"></i>
          <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password">
          <i class="fas fa-eye toggle-password" id="togglePassword"></i>
        </div>
      </div>

      <!-- Mot de passe oublié -->
      <div class="forgot-password">
        <a href="reset-password.html"><i class="fas fa-key"></i> Mot de passe oublié ?</a>
      </div>

      <!-- Bouton connexion -->
      <button type="submit" class="submit-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Connexion
      </button>

      <!-- Divider social -->
      <div class="social-divider">
        <span>ou</span>
      </div>

      <!-- Google button -->
      <button type="button" class="social-btn google" id="googleBtn">
        <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/>
          <path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/>
          <path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z"/>
          <path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/>
        </svg>
        Se connecter avec Google
      </button>

      <!-- Notification Permission Banner -->
      <div class="notif-permission-banner" id="notifPermissionBanner" style="display:none;">
        <p><i class="fas fa-bell"></i> Activez les notifications pour ne rien manquer !</p>
        <button class="btn-enable" id="enableNotifBtn"><i class="fas fa-check"></i> Activer</button>
      </div>
    </form>

    <div class="register-footer">
      Pas encore membre ? <a href="register.html">Créez votre compte</a>
    </div>
  </div>
</main>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script type="importmap">

  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",

  }

<script type="module">
// ================================================================
// IMPORTS FIREBASE
// ================================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider,
  setPersistence,
  browserLocalPersistence,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { 
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import {

// ================================================================
// TOAST
// ================================================================
function showToast(message, type) {
  type = type || 'info';
  toast.textContent = message;
  toast.className = 'toast ' + type;
  setTimeout(function() {
    toast.classList.add('show');
  }, 50);
  setTimeout(function() {
    toast.classList.remove('show');
  }, 4000);
}

// ================================================================
// MESSAGE
// ================================================================
function showMessage(text, type) {
  type = type || 'error';
  messageBanner.className = 'message-banner ' + type;
  messageIcon.className = type === 'error' ? 'fas fa-exclamation-circle' : 
                         (type === 'success' ? 'fas fa-check-circle' : 'fas fa-info-circle');
  messageText.textContent = text;
  messageBanner.classList.remove('hidden');
}

function hideMessage() {
  messageBanner.classList.add('hidden');
}

// ================================================================
// NOTIFICATIONS
// ================================================================
async function checkNotificationPermission() {
  try {
    if (Notification.permission === 'granted') {
      notifBadge.className = 'notif-badge';
      notifStatusText.textContent = '🔔';
      if (notifPermissionBanner) notifPermissionBanner.style.display = 'none';
      return;
    }
    
    if (Notification.permission === 'denied') {
      notifBadge.className = 'notif-badge';
      notifStatusText.textContent = '🔕';
      if (notifPermissionBanner) notifPermissionBanner.style.display = 'none';
      return;
    }
    
    // Par défaut → afficher la bannière
    notifBadge.className = 'notif-badge';
    notifStatusText.textContent = '🔔';
    if (notifPermissionBanner) notifPermissionBanner.style.display = 'flex';
    
  } catch (error) {
    console.error('Erreur check notification:', error);
  }
}

        notifStatusText.textContent = '🔔';
        if (notifPermissionBanner) notifPermissionBanner.style.display = 'none';

  });

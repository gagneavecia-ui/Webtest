<!-- test-notifications.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Notifications ARVEXA</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0A0A0A; color: #F5F0E8; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: rgba(20,20,20,0.7); padding: 20px; border-radius: 16px; margin-bottom: 16px; }
    h1 { font-family: 'Playfair Display', serif; }
    h1 span { color: #B8860B; font-style: italic; }
    button {
      background: #B8860B; color: #0A0A0A; border: none;
      padding: 12px 24px; border-radius: 8px; font-weight: bold;
      cursor: pointer; margin: 8px 0; width: 100%;
      font-family: 'Inter', sans-serif;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { padding: 12px; border-radius: 8px; margin-top: 12px; }
    .success { background: rgba(45,125,90,0.2); border: 1px solid #2D7D5A; color: #2D7D5A; }
    .error { background: rgba(138,58,58,0.2); border: 1px solid #8A3A3A; color: #8A3A3A; }
    .info { background: rgba(184,134,11,0.2); border: 1px solid #B8860B; color: #B8860B; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔔 Test <span>notifications</span></h1>
  
  <div class="card">
    <h3>📱 Statut</h3>
    <div id="status" class="status info">⏳ Initialisation...</div>
  </div>
  
  <div class="card">
    <h3>📤 Envoyer</h3>
    <button id="testNotifBtn">📨 Notification test</button>
    <button id="testDepositBtn">💰 Simuler dépôt</button>
    <button id="testGainBtn">📈 Simuler gain</button>
  </div>
  
  <div class="card">
    <h3>🔄 Actions</h3>
    <button id="resetTokenBtn">🔄 Réinitialiser token</button>
    <button id="checkPermissionBtn">🔍 Vérifier permission</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
  }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged } from "firebase/auth";
import { setupNotifications, listenForMessages, sendNotificationToAll } from './notifications.js';

const firebaseConfig = {
  apiKey: "AIzaSyBEbYuuUlNCLMBUHClv4UnyownNHw2q3_g",
  authDomain: "nexgen-39043.firebaseapp.com",
  projectId: "nexgen-39043",
  storageBucket: "nexgen-39043.firebasestorage.app",
  messagingSenderId: "619390144325",
  appId: "1:619390144325:web:35d96b125501e4e8b1782c",
  measurementId: "G-HC2Q5DNKDR"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const statusDiv = document.getElementById('status');

function setStatus(message, type = 'info') {
  statusDiv.textContent = message;
  statusDiv.className = `status ${type}`;
}

onAuthStateChanged(auth, async (user) => {
  if (user && user.email === 'gagneavecia@gmail.com') {
    setStatus('✅ Admin connecté', 'success');
    const token = await setupNotifications();
    if (token) {
      setStatus('✅ Token: ' + token.substring(0, 20) + '...', 'success');
      listenForMessages();
    }
  } else if (user) {
    setStatus('⚠️ Connecté mais pas admin', 'error');
  } else {
    setStatus('⚠️ Non connecté', 'error');
  }
});

document.getElementById('testNotifBtn').addEventListener('click', async () => {
  setStatus('📨 Envoi...', 'info');
  await sendNotificationToAll('🔔 Test', 'Notification depuis ARVEXA !', { type: 'info' });
  setStatus('✅ Envoyé !', 'success');
});

document.getElementById('testDepositBtn').addEventListener('click', async () => {
  setStatus('💰 Envoi...', 'info');
  await sendNotificationToAll('💰 Nouveau dépôt', 'Jean - 5 000 FCFA', { type: 'new_deposit', amount: '5000', userName: 'Jean' });
  setStatus('✅ Envoyé !', 'success');
});

document.getElementById('testGainBtn').addEventListener('click', async () => {
  setStatus('📈 Envoi...', 'info');
  await sendNotificationToAll('📈 Gain reçu', '1 500 FCFA ajoutés', { type: 'investment_gain', amount: '1500' });
  setStatus('✅ Envoyé !', 'success');
});

document.getElementById('resetTokenBtn').addEventListener('click', () => {
  localStorage.removeItem('fcm_token');
  setStatus('🔄 Token réinitialisé', 'info');
});

document.getElementById('checkPermissionBtn').addEventListener('click', () => {
  setStatus('🔍 Permission: ' + Notification.permission, Notification.permission === 'granted' ? 'success' : 'error');
});
</script>
</body>
</html>

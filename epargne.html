<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="description" content="ARVEXA - Défis quotidiens">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png" type="image/png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #1A3A2A;
      --primary-dark: #0A1A12;
      --primary-light: #2A5A3A;
      --accent: #B8860B;
      --accent-dim: rgba(184, 134, 11, 0.08);
      --success: #2D7D5A;
      --danger: #8A3A3A;
      --bg-dark: #0A0A0A;
      --bg-surface: #141414;
      --bg-card: rgba(20, 20, 20, 0.7);
      --text-light: #F5F0E8;
      --text-dim: #8A8A7A;
      --text-muted: #5A5A4A;
      --card-border: rgba(184, 134, 11, 0.06);
      --glass-bg: rgba(26, 58, 42, 0.15);
      --glass-border: rgba(184, 134, 11, 0.04);
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      opacity: 0;
      animation: pageFadeIn 0.5s ease forwards;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 80px;
    }

    @keyframes pageFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 40% 30% at 30% 20%, rgba(26, 58, 42, 0.10) 0%, transparent 70%),
                  linear-gradient(180deg, #0A0A0A 0%, #060606 100%);
      pointer-events: none;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.15;
      animation: glowMove 10s ease-in-out infinite alternate;
    }
    .glow-1 { width: 350px; height: 350px; background: rgba(26,58,42,0.15); top: -80px; right: -80px; }
    .glow-2 { width: 200px; height: 200px; background: rgba(184,134,11,0.03); bottom: 0; left: 0; animation-delay: -4s; }
    .glow-3 { width: 250px; height: 250px; background: rgba(26,58,42,0.08); top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }
    @keyframes glowMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -20px) scale(1.1); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5%;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(184, 134, 11, 0.04);
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--text-light);
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      letter-spacing: 2px;
    }
    .logo span { color: var(--accent); font-style: italic; }

    .back-btn {
      width: clamp(32px, 4vw, 40px);
      height: clamp(32px, 4vw, 40px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:active {
      transform: scale(0.94);
      background: rgba(184, 134, 11, 0.08);
    }
    .back-btn i { font-size: clamp(14px, 1.8vw, 18px); }

    .notif-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 10px;
      font-weight: 500;
      transition: var(--transition);
      background: rgba(45, 125, 90, 0.08);
      color: var(--success);
      border: 1px solid rgba(45, 125, 90, 0.10);
    }
    .notif-badge i { font-size: 12px; }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px 16px 40px;
      width: 100%;
    }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, rgba(26, 58, 42, 0.20), rgba(10, 26, 18, 0.10));
      border-radius: var(--radius);
      padding: 28px 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(184, 134, 11, 0.10);
      text-align: center;
    }
    .hero-icon { font-size: 40px; color: var(--accent); margin-bottom: 10px; display: block; }
    .hero h1 { font-size: 24px; font-weight: 700; font-family: 'Playfair Display', serif; color: var(--text-light); }
    .hero h1 span { color: var(--accent); font-style: italic; }
    .hero p { color: var(--text-dim); font-size: 13px; margin-top: 6px; }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .hero-stats .stat { text-align: center; }
    .hero-stats .stat .value { font-size: 20px; font-weight: 700; color: var(--accent); font-family: 'Playfair Display', serif; }
    .hero-stats .stat .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ===== PROGRESS ===== */
    .progress-card {
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .progress-card .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .progress-card .progress-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
    }
    .progress-card .progress-title span { color: var(--accent); }
    .progress-card .progress-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar .bar {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), var(--success));
      transition: width 0.5s ease;
      width: 0%;
    }

    /* ===== DEFIS GRID ===== */
    .defis-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .defi-card {
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      opacity: 0;
      animation: fadeInUp 0.4s ease forwards;
    }
    .defi-card:nth-child(1) { animation-delay: 0.05s; }
    .defi-card:nth-child(2) { animation-delay: 0.10s; }
    .defi-card:nth-child(3) { animation-delay: 0.15s; }
    .defi-card:nth-child(4) { animation-delay: 0.20s; }
    .defi-card:nth-child(5) { animation-delay: 0.25s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .defi-card:active { transform: scale(0.98); }
    .defi-card:hover { border-color: rgba(184, 134, 11, 0.08); }

    .defi-card .defi-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .defi-card .defi-icon.quiz { background: rgba(184, 134, 11, 0.10); color: var(--accent); }
    .defi-card .defi-icon.jeu { background: rgba(45, 125, 90, 0.10); color: var(--success); }
    .defi-card .defi-icon.special { background: rgba(138, 58, 58, 0.10); color: #8A3A3A; }
    .defi-card .defi-icon.final { background: rgba(99, 102, 241, 0.10); color: #6366F1; }

    .defi-card .defi-content {
      flex: 1;
      min-width: 0;
    }
    .defi-card .defi-day {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .defi-card .defi-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
    }
    .defi-card .defi-desc {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 300;
    }
    .defi-card .defi-reward {
      font-size: 14px;
      font-weight: 700;
      color: var(--success);
      text-align: right;
      flex-shrink: 0;
    }

    .defi-card .defi-status {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 18px;
    }
    .defi-card .defi-status.done { color: var(--success); }
    .defi-card .defi-status.locked { color: var(--text-muted); opacity: 0.3; }
    .defi-card .defi-status.failed { color: var(--danger); }

    .defi-card .defi-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
      margin-top: 4px;
    }
    .defi-card .defi-btn.start {
      background: var(--accent);
      color: var(--bg-dark);
    }
    .defi-card .defi-btn.start:active { transform: scale(0.95); }
    .defi-card .defi-btn.start:hover { background: #9A7209; }

    .defi-card .defi-btn.done {
      background: rgba(45, 125, 90, 0.12);
      color: var(--success);
      cursor: default;
    }
    .defi-card .defi-btn.locked {
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .defi-card .defi-btn.failed {
      background: rgba(138, 58, 58, 0.10);
      color: var(--danger);
      cursor: default;
    }

    /* ===== MODAL QUIZ ===== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(3, 3, 5, 0.96);
      backdrop-filter: blur(16px);
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(184, 134, 11, 0.15);
      border-radius: var(--radius);
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow: hidden;
      transform: scale(0.92);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.show .modal { transform: scale(1); }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      color: var(--text-light);
    }
    .modal-header h3 span { color: var(--accent); font-style: italic; }
    .modal-close {
      width: 34px; height: 34px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-dim);
    }
    .modal-close:active { transform: scale(0.94); }

    .modal-body {
      padding: 20px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .modal-body .question-item {
      background: rgba(10, 10, 10, 0.4);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .modal-body .question-item .q-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
      margin-bottom: 8px;
    }
    .modal-body .question-item .q-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .modal-body .question-item .q-options label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(10, 10, 10, 0.3);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      font-size: 13px;
      color: var(--text-dim);
    }
    .modal-body .question-item .q-options label:active { transform: scale(0.98); }
    .modal-body .question-item .q-options label:hover { border-color: rgba(184, 134, 11, 0.15); }
    .modal-body .question-item .q-options input[type="radio"] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .modal-body .question-item .q-options label.selected {
      border-color: var(--accent);
      background: rgba(184, 134, 11, 0.06);
    }
    .modal-body .question-item .q-options label.correct {
      border-color: var(--success);
      background: rgba(45, 125, 90, 0.06);
      color: var(--success);
    }
    .modal-body .question-item .q-options label.wrong {
      border-color: var(--danger);
      background: rgba(138, 58, 58, 0.06);
      color: var(--danger);
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 10px;
    }
    .modal-footer .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: var(--bg-dark);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }
    .modal-footer .btn-submit:active { transform: scale(0.97); }
    .modal-footer .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== MODAL JEU ===== */
    .game-container {
      text-align: center;
      padding: 10px 0;
    }
    .game-container .game-score {
      font-size: 48px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      margin: 10px 0;
    }
    .game-container .game-target {
      font-size: 14px;
      color: var(--text-dim);
    }
    .game-container .game-target span { color: var(--accent); font-weight: 700; }
    .game-container .game-essais {
      font-size: 12px;
      color: var(--text-muted);
      margin: 6px 0 12px;
    }

    .game-btn {
      padding: 12px 30px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
      margin: 4px;
    }
    .game-btn:active { transform: scale(0.95); }
    .game-btn.primary { background: var(--accent); color: var(--bg-dark); }
    .game-btn.primary:hover { background: #9A7209; }
    .game-btn.success { background: var(--success); color: #fff; }
    .game-btn.danger { background: var(--danger); color: #fff; }
    .game-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ============================================================
       TOAST
       ============================================================ */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      max-width: 90%;
      width: 400px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #0D2A1F; border: 1px solid #2D7D5A; color: #2D7D5A; }
    .toast.error { background: #2A0D0D; border: 1px solid #8A3A3A; color: #8A3A3A; }
    .toast.warning { background: #2A1A0D; border: 1px solid #B8860B; color: #B8860B; }
    .toast.info { background: #0D1A2A; border: 1px solid #4A7A8A; color: #4A7A8A; }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 480px) {
      .container { padding: 12px 12px 30px; }
      .hero h1 { font-size: 20px; }
      .defi-card { flex-wrap: wrap; padding: 14px; }
      .defi-card .defi-reward { width: 100%; text-align: left; }
      .defi-card .defi-status { top: 6px; right: 6px; font-size: 14px; }
      .modal { max-width: 100%; margin: 10px; }
      .game-container .game-score { font-size: 36px; }
    }

    @media (min-width: 768px) {
      .container { max-width: 700px; padding: 24px 24px 40px; }
    }
  </style>
</head>
<body>

<div class="gradient-bg"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>

<header class="header">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  <a href="index.html" class="logo">ARVE<span>XA</span></a>
  <span class="notif-badge" id="notifBadge">
    <i class="fas fa-circle"></i> <span id="notifStatusText">🔔</span>
  </span>
</header>

<main class="container">

  <!-- ===== HERO ===== -->
  <div class="hero">
    <span class="hero-icon"><i class="fas fa-trophy"></i></span>
    <h1>🏆 Défis <span>Hebdomadaires</span></h1>
    <p>Chaque semaine, gagnez jusqu'à <strong>300 FCFA</strong> en relevant des défis</p>
    <div class="hero-stats">
      <div class="stat">
        <div class="value">300 FCFA</div>
        <div class="label">À gagner cette semaine</div>
      </div>
      <div class="stat">
        <div class="value" id="defisTotal">5</div>
        <div class="label">Défis</div>
      </div>
    </div>
  </div>

  <!-- ===== PROGRESS ===== -->
  <div class="progress-card">
    <div class="progress-header">
      <span class="progress-title">Progression <span>hebdomadaire</span></span>
      <span class="progress-value" id="progressValue">0 / 300 FCFA</span>
    </div>
    <div class="progress-bar">
      <div class="bar" id="progressBar"></div>
    </div>
  </div>

  <!-- ===== DÉFIS ===== -->
  <div class="defis-grid" id="defisGrid">
    <!-- Les défis seront générés par JavaScript -->
  </div>

</main>

<!-- ===== MODAL QUIZ ===== -->
<div class="modal-overlay" id="quizModal">
  <div class="modal">
    <div class="modal-header">
      <h3>📝 <span id="quizTitle">Quiz</span></h3>
      <button class="modal-close" id="closeQuizModal"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="quizBody">
      <!-- Questions générées par JS -->
    </div>
    <div class="modal-footer">
      <button class="btn-submit" id="submitQuizBtn">📤 Valider mes réponses</button>
    </div>
  </div>
</div>

<!-- ===== MODAL JEU ===== -->
<div class="modal-overlay" id="gameModal">
  <div class="modal">
    <div class="modal-header">
      <h3>🎮 <span id="gameTitle">Jeu</span></h3>
      <button class="modal-close" id="closeGameModal"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="gameBody">
      <div class="game-container" id="gameContainer">
        <!-- Contenu du jeu généré par JS -->
      </div>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ================================================================ -->
<!-- CONFIGURATION CENTRALISÉE -->
<!-- ================================================================ -->
<script src="config.js"></script>

<!-- ================================================================ -->
<!-- IMPORTS -->
<!-- ================================================================ -->
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js"
  }
}
</script>

<script type="module">
// ================================================================

// ================================================================
// TOAST
// ================================================================
function showToast(message, type = 'info') {
  toast.textContent = message;
  toast.className = 'toast ' + type;
  setTimeout(() => toast.classList.add('show'), 50);
  setTimeout(() => toast.classList.remove('show'), 4000);
}

// ================================================================
// FORMAT CURRENCY
// ================================================================
function formatCurrency(amount) {
  if (!amount) return '0 FCFA';
  return amount.toLocaleString('fr-FR') + ' FCFA';
}

// ================================================================
// CHARGER L'ÉTAT DES DÉFIS
// ================================================================
function loadUserDefis(uid) {
  const userRef = doc(db, 'users', uid);
  onSnapshot(userRef, (snap) => {
    if (snap.exists()) {
      userData = snap.data();
      userDefis = userData.defisHebdo || {};
      renderDefis();
      updateProgress();
    }
  }, (error) => {
    console.error('Erreur chargement défis:', error);
  });
}

// ================================================================
// SAUVEGARDER L'ÉTAT D'UN DÉFI
// ================================================================
async function saveDefiStatus(jour, status, gain = 0) {
  if (!currentUser) return;
  
  const userRef = doc(db, 'users', currentUser.uid);
  const defisHebdo = { ...(userData?.defisHebdo || {}) };
  
  defisHebdo[jour] = {
    status: status, // 'done', 'failed', 'locked'
    gain: gain,
    date: new Date().toISOString()
  };
  
  // Mettre à jour le total des défis gagnés
  const totalDefisGagnes = (userData?.totalDefisGagnes || 0) + gain;
  
  try {
    await updateDoc(userRef, {
      defisHebdo: defisHebdo,
      totalDefisGagnes: totalDefisGagnes,
      gainsTotal: increment(gain)
    });
    showToast('✅ Défi validé ! +' + formatCurrency(gain), 'success');
  } catch (error) {
    console.error('Erreur sauvegarde:', error);
    showToast('❌ Erreur lors de la sauvegarde', 'error');
  }
}

// ================================================================
// RENDRE LES DÉFIS
// ================================================================
function renderDefis() {
  const semaine = SEMAINE_1;
  defisTotal.textContent = semaine.defis.length;
  
  let html = '';
  const today = new Date().getDay(); // 1=lundi, 5=vendredi
  
  semaine.defis.forEach((defi, index) => {
    const jourNum = defi.jour;
    const estAujourdHui = jourNum === today;
    const estPasse = jourNum < today;
    const estFutur = jourNum > today;
    
    // Vérifier le statut
    let status = 'locked';
    let gain = 0;
    
    if (userDefis && userDefis[jourNum]) {
      status = userDefis[jourNum].status;
      gain = userDefis[jourNum].gain || 0;
    } else if (estPasse) {
      status = 'failed'; // Jour passé non fait = échec
    } else if (estFutur) {
      status = 'locked';
    } else if (estAujourdHui) {
      status = 'start';
    }
    
    // Déterminer l'icône de statut
    let statusIcon = '';
    let statusClass = '';
    let btnHtml = '';
    
    if (status === 'done') {
      statusIcon = '<i class="fas fa-check-circle"></i>';
      statusClass = 'done';
      btnHtml = `<button class="defi-btn done">✅ Fait</button>`;
    } else if (status === 'failed') {
      statusIcon = '<i class="fas fa-times-circle"></i>';
      statusClass = 'failed';
      btnHtml = `<button class="defi-btn failed">❌ Échoué</button>`;
    } else if (status === 'locked') {
      statusIcon = '<i class="fas fa-lock"></i>';
      statusClass = 'locked';
      btnHtml = `<button class="defi-btn locked">🔒 Verrouillé</button>`;
    } else if (status === 'start') {
      statusIcon = '<i class="fas fa-play-circle"></i>';
      statusClass = '';
      btnHtml = `<button class="defi-btn start" data-index="${index}">🚀 Commencer</button>`;
    }
    
    const iconClass = defi.iconClass || 'quiz';
    const jourNom = defi.nom || 'Jour ' + jourNum;
    
    html += `
      <div class="defi-card">
        <div class="defi-icon ${iconClass}">
          <i class="fas ${defi.icone || 'fa-question'}"></i>
        </div>
        <div class="defi-content">
          <div class="defi-day">${jourNom}</div>
          <div class="defi-title">${defi.titre}</div>
          <div class="defi-desc">${defi.description}</div>
          ${btnHtml}
        </div>
        <div class="defi-reward">+${defi.recompense} FCFA</div>
        <div class="defi-status ${statusClass}">${statusIcon}</div>
      </div>
    `;
  });
  
  defisGrid.innerHTML = html;
  
  // Attacher les événements aux boutons "Commencer"
  document.querySelectorAll('.defi-btn.start').forEach(btn => {
    btn.addEventListener('click', function() {
      const index = parseInt(this.dataset.index);
      if (!isNaN(index)) {
        openDefi(index);
      }
    });
  });
}

// ================================================================
// METTRE À JOUR LA PROGRESSION
// ================================================================
function updateProgress() {
  let totalGagne = 0;
  const semaine = SEMAINE_1;
  
  semaine.defis.forEach(defi => {
    if (userDefis && userDefis[defi.jour] && userDefis[defi.jour].status === 'done') {
      totalGagne += defi.recompense;
    }
  });
  
  const total = semaine.totalRecompense || 300;
  const pourcentage = Math.min((totalGagne / total) * 100, 100);
  
  progressBar.style.width = pourcentage + '%';
  progressValue.textContent = totalGagne + ' / ' + total + ' FCFA';
}

// ================================================================
// OUVRIR UN DÉFI
// ================================================================
function openDefi(index) {
  const defi = SEMAINE_1.defis[index];
  currentDefiIndex = index;
  
  if (defi.type === 'quiz') {
    openQuiz(defi);
  } else if (defi.type === 'jeu') {
    openGame(defi);
  } else if (defi.type === 'special') {
    openSpecial(defi);
  }
}

// ================================================================
// MODAL QUIZ
// ================================================================
function openQuiz(defi) {
  quizTitle.textContent = defi.titre;
  quizReponses = new Array(defi.questions.length).fill(-1);
  
  let html = '';
  defi.questions.forEach((q, index) => {
    html += `
      <div class="question-item">
        <div class="q-text">${index + 1}. ${q.question}</div>
        <div class="q-options" data-q="${index}">
          ${q.options.map((opt, optIndex) => `
            <label data-opt="${optIndex}">
              <input type="radio" name="q${index}" value="${optIndex}">
              ${opt}
            </label>
          `).join('')}
        </div>
      </div>
    `;
  });
  
  quizBody.innerHTML = html;
  
  // Attacher les événements radio
  document.querySelectorAll('.question-item input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', function() {
      const qIndex = parseInt(this.name.replace('q', ''));
      const optIndex = parseInt(this.value);
      quizReponses[qIndex] = optIndex;
      
      // Mettre à jour l'affichage
      const parent = this.closest('.q-options');
      parent.querySelectorAll('label').forEach(label => {
        label.classList.remove('selected');
      });
      this.closest('label').classList.add('selected');
    });
  });
  
  submitQuizBtn.disabled = false;
  submitQuizBtn.textContent = '📤 Valider mes réponses';
  submitQuizBtn.onclick = () => submitQuiz(defi);
  
  quizModal.classList.add('show');
}

function submitQuiz(defi) {
  // Vérifier si toutes les questions ont une réponse
  const toutesRepondues = quizReponses.every(r => r !== -1);
  if (!toutesRepondues) {
    showToast('⚠️ Répondez à toutes les questions !', 'warning');
    return;
  }
  
  // Compter les bonnes réponses
  let score = 0;
  defi.questions.forEach((q, index) => {
    if (quizReponses[index] === q.bonne) {
      score++;
    }
  });
  
  const scoreRequis = defi.scoreRequis || 7;
  const reussite = score >= scoreRequis;
  
  // Afficher les résultats
  let html = '<div style="text-align:center;padding:20px;">';
  html += `<div style="font-size:48px;margin-bottom:12px;">${reussite ? '🎉' : '😅'}</div>`;
  html += `<h3 style="color:${reussite ? 'var(--success)' : 'var(--danger)'};">${reussite ? 'Félicitations !' : 'Pas de chance !'}</h3>`;
  html += `<p style="color:var(--text-dim);margin:8px 0;">Score : ${score} / ${defi.questions.length}</p>`;
  html += `<p style="color:var(--text-dim);">${reussite ? '✅ Vous avez gagné ' + formatCurrency(defi.recompense) : '❌ Réessayez demain !'}</p>`;
  html += '</div>';
  html += '<div style="display:flex;gap:10px;justify-content:center;margin-top:16px;">';
  html += `<button class="game-btn primary" onclick="closeQuizModal.click()">Fermer</button>`;
  html += '</div>';
  
  quizBody.innerHTML = html;
  submitQuizBtn.style.display = 'none';
  
  if (reussite) {
    saveDefiStatus(defi.jour, 'done', defi.recompense);
    renderDefis();
    updateProgress();
  } else {
    saveDefiStatus(defi.jour, 'failed', 0);
    renderDefis();
    updateProgress();
  }
}

// ================================================================
// MODAL JEU - MÉMOIRE
// ================================================================
function openGame(defi) {
  gameTitle.textContent = defi.titre;
  
  const essaisRestants = defi.essaisMax - (userDefis[defi.jour]?.essais || 0);
  
  let html = `
    <div class="game-container">
      <p class="game-target">🎯 Score cible : <span>${defi.scoreRequis}</span></p>
      <p class="game-essais">Essais restants : ${essaisRestants > 0 ? essaisRestants : '0'}</p>
      <div style="margin:16px 0;">
        <button class="game-btn primary" id="startMemoryGameBtn">🎮 Jouer</button>
      </div>
      <div id="memoryGameBoard" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:300px;margin:0 auto;">
        <!-- Cartes générées par JS -->
      </div>
      <p id="memoryScore" style="margin-top:10px;font-size:16px;font-weight:600;color:var(--accent);"></p>
    </div>
  `;
  
  gameBody.innerHTML = html;
  gameModal.classList.add('show');
  
  // Initialiser le jeu de mémoire
  let memoryCards = [];
  let flippedCards = [];
  let matchedPairs = 0;
  let isLocked = false;
  let gameStarted = false;
  
  const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
  const board = document.getElementById('memoryGameBoard');
  const scoreDisplay = document.getElementById('memoryScore');
  
  function initMemoryGame() {
    const pairs = emojis.slice(0, 4); // 4 paires = 8 cartes
    memoryCards = [...pairs, ...pairs];
    // Mélanger
    for (let i = memoryCards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [memoryCards[i], memoryCards[j]] = [memoryCards[j], memoryCards[i]];
    }
    flippedCards = [];
    matchedPairs = 0;
    isLocked = false;
    gameStarted = true;
    renderMemoryBoard();
    scoreDisplay.textContent = 'Paires trouvées : 0 / 4';
  }
  
  function renderMemoryBoard() {
    board.innerHTML = memoryCards.map((emoji, index) => `
      <div class="memory-card" data-index="${index}" style="
        aspect-ratio:1;
        background:var(--bg-dark);
        border:1px solid var(--card-border);
        border-radius:8px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:28px;
        cursor:pointer;
        transition:all 0.3s ease;
        ${flippedCards.includes(index) || memoryCards[index] === 'matched' ? 'background:rgba(184,134,11,0.10);border-color:var(--accent);' : ''}
      ">
        ${flippedCards.includes(index) || memoryCards[index] === 'matched' ? emoji : '❓'}
      </div>
    `).join('');
    
    document.querySelectorAll('.memory-card').forEach(card => {
      card.addEventListener('click', () => handleCardClick(parseInt(card.dataset.index)));
    });
  }
  
  function handleCardClick(index) {
    if (isLocked || flippedCards.includes(index) || memoryCards[index] === 'matched') return;
    if (!gameStarted) return;
    
    flippedCards.push(index);
    renderMemoryBoard();
    
    if (flippedCards.length === 2) {
      isLocked = true;
      const [i1, i2] = flippedCards;
      if (memoryCards[i1] === memoryCards[i2]) {
        // Paire trouvée
        memoryCards[i1] = 'matched';
        memoryCards[i2] = 'matched';
        matchedPairs++;
        flippedCards = [];
        isLocked = false;
        scoreDisplay.textContent = `Paires trouvées : ${matchedPairs} / 4`;
        renderMemoryBoard();
        
        if (matchedPairs === 4) {
          // Victoire !
          const essaisUtilises = (userDefis[defi.jour]?.essais || 0) + 1;
          const reussi = true;
          handleGameResult(defi, reussi, essaisUtilises);
        }
      } else {
        // Pas une paire
        setTimeout(() => {
          flippedCards = [];
          isLocked = false;
          renderMemoryBoard();
        }, 800);
      }
    }
  }
  
  // Bouton démarrer
  document.getElementById('startMemoryGameBtn').addEventListener('click', function() {
    if (essaisRestants <= 0) {
      showToast('❌ Plus d\'essais pour aujourd\'hui !', 'error');
      return;
    }
    initMemoryGame();
    this.textContent = '🔄 Recommencer';
  });
}

function handleGameResult(defi, reussi, essaisUtilises) {
  const essaisRestants = defi.essaisMax - essaisUtilises;
  
  // Sauvegarder le nombre d'essais
  const userRef = doc(db, 'users', currentUser.uid);
  const defisHebdo = { ...(userData?.defisHebdo || {}) };
  if (!defisHebdo[defi.jour]) {
    defisHebdo[defi.jour] = { essais: 0 };
  }
  defisHebdo[defi.jour].essais = essaisUtilises;
  
  if (reussi) {
    saveDefiStatus(defi.jour, 'done', defi.recompense);
    renderDefis();
    updateProgress();
    showToast('🎉 Victoire ! +' + formatCurrency(defi.recompense), 'success');
    gameModal.classList.remove('show');
  } else if (essaisRestants <= 0) {
    saveDefiStatus(defi.jour, 'failed', 0);
    renderDefis();
    updateProgress();
    showToast('❌ Plus d\'essais, défi échoué', 'error');
    gameModal.classList.remove('show');
  } else {
    // Réessayer
    showToast(`💪 Encore un essai ! (${essaisRestants} restant${essaisRestants > 1 ? 's' : ''})`, 'info');
    // Réinitialiser le jeu
    const board = document.getElementById('memoryGameBoard');
    if (board) {
      const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
      const pairs = emojis.slice(0, 4);
      let newCards = [...pairs, ...pairs];
      for (let i = newCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newCards[i], newCards[j]] = [newCards[j], newCards[i]];
      }
      memoryCards = newCards;
      flippedCards = [];
      matchedPairs = 0;
      isLocked = false;
      renderMemoryBoard();
      document.getElementById('memoryScore').textContent = 'Paires trouvées : 0 / 4';
    }
  }
}

// ================================================================
// MODAL DÉFI SPÉCIAL
// ================================================================
function openSpecial(defi) {
  // Défi spécial = mélange de quiz + jeu
  // On utilise le quiz avec les questions Vrai/Faux
  quizTitle.textContent = defi.titre + ' 🎯';
  quizReponses = new Array(defi.questions.length).fill(-1);
  
  let html = '';
  defi.questions.forEach((q, index) => {
    html += `
      <div class="question-item">
        <div class="q-text">${index + 1}. ${q.question}</div>
        <div class="q-options" data-q="${index}">
          ${q.options.map((opt, optIndex) => `
            <label data-opt="${optIndex}">
              <input type="radio" name="q${index}" value="${optIndex}">
              ${opt}
            </label>
          `).join('')}
        </div>
      </div>
    `;
  });
  
  quizBody.innerHTML = html;
  
  document.querySelectorAll('.question-item input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', function() {
      const qIndex = parseInt(this.name.replace('q', ''));
      const optIndex = parseInt(this.value);
      quizReponses[qIndex] = optIndex;
      
      const parent = this.closest('.q-options');
      parent.querySelectorAll('label').forEach(label => {
        label.classList.remove('selected');
      });
      this.closest('label').classList.add('selected');
    });
  });
  
  submitQuizBtn.disabled = false;
  submitQuizBtn.textContent = '📤 Valider mes réponses';
  submitQuizBtn.style.display = 'block';
  submitQuizBtn.onclick = () => submitSpecial(defi);
  
  quizModal.classList.add('show');
}

function submitSpecial(defi) {
  const toutesRepondues = quizReponses.every(r => r !== -1);
  if (!toutesRepondues) {
    showToast('⚠️ Répondez à toutes les questions !', 'warning');
    return;
  }
  
  let score = 0;
  defi.questions.forEach((q, index) => {
    if (quizReponses[index] === q.bonne) {
      score++;
    }
  });
  
  const scoreRequis = defi.scoreRequis || 8;
  const reussite = score >= scoreRequis;
  
  let html = '<div style="text-align:center;padding:20px;">';
  html += `<div style="font-size:48px;margin-bottom:12px;">${reussite ? '🎉' : '😅'}</div>`;
  html += `<h3 style="color:${reussite ? 'var(--success)' : 'var(--danger)'};">${reussite ? 'Félicitations !' : 'Pas de chance !'}</h3>`;
  html += `<p style="color:var(--text-dim);margin:8px 0;">Score : ${score} / ${defi.questions.length}</p>`;
  html += `<p style="color:var(--text-dim);">${reussite ? '✅ Vous avez gagné ' + formatCurrency(defi.recompense) : '❌ Réessayez demain !'}</p>`;
  html += '</div>';
  html += '<div style="display:flex;gap:10px;justify-content:center;margin-top:16px;">';
  html += `<button class="game-btn primary" onclick="closeQuizModal.click()">Fermer</button>`;
  html += '</div>';
  
  quizBody.innerHTML = html;
  submitQuizBtn.style.display = 'none';
  
  if (reussite) {
    saveDefiStatus(defi.jour, 'done', defi.recompense);
    renderDefis();
    updateProgress();
  } else {
    saveDefiStatus(defi.jour, 'failed', 0);
    renderDefis();
    updateProgress();
  }
}

  if (user) {
    currentUser = user;
    localStorage.setItem('ARVEXA_current_user', user.uid);
    loadUserDefis(user.uid);
    isPageLoading = false;
  } else {

      setTimeout(() => {
        if (!auth.currentUser) {

          if (savedUid) {
            if (!auth.currentUser) {
              window.location.href = 'login.html';
            }
          } else {
            window.location.href = 'login.html';
          }
        }
      }, 3000);
    } else {
      const savedUid = localStorage.getItem('ARVEXA_current_user');
      if (savedUid) {
        setTimeout(() => {
          if (!auth.currentUser) {
            window.location.href = 'login.html';
          }
        }, 2000);
      } else {
        window.location.href = 'login.html';
      }
    }
  }
});

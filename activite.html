<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="description" content="ARVEXA - Mon Activité">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #1A3A2A;
      --primary-dark: #0A1A12;
      --primary-light: #2A5A3A;
      --accent: #B8860B;
      --accent-dim: rgba(184, 134, 11, 0.08);
      --success: #2D7D5A;
      --danger: #8A3A3A;
      --warning: #B8860B;
      --bg-dark: #0A0A0A;
      --bg-surface: #141414;
      --bg-card: rgba(20, 20, 20, 0.7);
      --text-light: #F5F0E8;
      --text-dim: #8A8A7A;
      --text-muted: #5A5A4A;
      --card-border: rgba(184, 134, 11, 0.06);
      --glass-bg: rgba(26, 58, 42, 0.15);
      --glass-border: rgba(184, 134, 11, 0.04);
      --transition: all 0.25s ease;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #0A0A0A;
      color: #F5F0E8;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 40px;
      -webkit-overflow-scrolling: touch;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 40% 30% at 30% 20%, rgba(26, 58, 42, 0.08) 0%, transparent 70%),
                  linear-gradient(180deg, #0A0A0A 0%, #060606 100%);
      pointer-events: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(184, 134, 11, 0.04);
      width: 100%;
      max-width: 100%;
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: #F5F0E8;
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      letter-spacing: 2px;
    }
    .logo span {
      color: #B8860B;
      font-style: italic;
    }

    .back-btn {
      width: clamp(32px, 4vw, 40px);
      height: clamp(32px, 4vw, 40px);
      background: rgba(26, 58, 42, 0.15);
      border: 1px solid rgba(184, 134, 11, 0.04);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #F5F0E8;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:active {
      transform: scale(0.94);
      background: rgba(184, 134, 11, 0.08);
    }
    .back-btn i {
      font-size: clamp(14px, 1.8vw, 18px);
    }

    .notif-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 10px;
      font-weight: 500;
      transition: var(--transition);
      background: rgba(45, 125, 90, 0.08);
      color: var(--success);
      border: 1px solid rgba(45, 125, 90, 0.10);
    }
    .notif-badge i {
      font-size: 12px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px 5% 40px;
      width: 100%;
      overflow-x: hidden;
    }

    /* ===== PAGE HEADER ===== */
    .page-header {
      margin-bottom: 20px;
    }
    .page-header .subtitle {
      font-size: 10px;
      font-weight: 500;
      color: #B8860B;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .page-header h1 {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 700;
      margin-top: 2px;
      color: #F5F0E8;
    }
    .page-header h1 span {
      color: #B8860B;
      font-style: italic;
    }
    .page-header p {
      color: #8A8A7A;
      font-size: clamp(12px, 1.2vw, 14px);
      margin-top: 4px;
    }

    /* ===== CARD ===== */
    .card {
      background: rgba(20, 20, 20, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(184, 134, 11, 0.06);
      border-radius: var(--radius);
      padding: clamp(16px, 3vw, 24px);
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
      width: 100%;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .card:hover {
      border-color: rgba(184, 134, 11, 0.08);
    }
    .card-title {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-size: clamp(16px, 1.8vw, 19px);
      font-weight: 700;
      color: #F5F0E8;
      margin-bottom: 12px;
    }
    .card-title span {
      color: #B8860B;
      font-style: italic;
    }

    /* ===== STATS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .stat-item {
      background: rgba(10, 10, 10, 0.4);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
      transition: background 0.2s;
    }
    .stat-item:hover {
      background: rgba(10, 10, 10, 0.6);
    }
    .stat-item .stat-icon {
      font-size: clamp(20px, 2.5vw, 28px);
      margin-bottom: 4px;
    }
    .stat-item .stat-icon.gold { color: #B8860B; }
    .stat-item .stat-icon.green { color: #2D7D5A; }
    .stat-item .stat-icon.blue { color: #4A7A6A; }
    .stat-item .stat-icon.purple { color: #8A6A7A; }

    .stat-item .stat-value {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 700;
      color: #F5F0E8;
    }
    .stat-item .stat-label {
      font-size: 9px;
      color: #5A5A4A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* ===== GRAPHIQUE ===== */
    .chart-container {
      width: 100%;
      padding: 6px 0;
    }
    .chart-container canvas {
      width: 100% !important;
      height: auto !important;
      max-height: 160px;
      background: rgba(10,10,10,0.3);
      border-radius: 8px;
    }
    .chart-empty {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .chart-empty i {
      font-size: 28px;
      opacity: 0.3;
      display: block;
      margin-bottom: 6px;
    }

    /* ===== FILTERS ===== */
    .filter-section {
      margin-bottom: 14px;
    }
    .filter-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .filter-tab {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(184, 134, 11, 0.06);
      background: transparent;
      color: #8A8A7A;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .filter-tab:active {
      transform: scale(0.96);
    }
    .filter-tab.active {
      background: rgba(184, 134, 11, 0.08);
      border-color: rgba(184, 134, 11, 0.15);
      color: #B8860B;
    }
    .filter-tab:hover:not(.active) {
      border-color: rgba(184, 134, 11, 0.1);
      color: #F5F0E8;
    }
    .filter-tab i {
      margin-right: 4px;
      font-size: 10px;
    }

    .filter-period {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .filter-period .filter-tab {
      font-size: 10px;
      padding: 3px 10px;
    }

    .tx-count {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: block;
    }

    /* ===== TRANSACTIONS ===== */
    .transaction-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }
    .transaction-item:last-child {
      border-bottom: none;
    }
    .transaction-item .tx-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .transaction-item .tx-icon.depot { background: rgba(45, 125, 90, 0.12); color: #2D7D5A; }
    .transaction-item .tx-icon.retrait { background: rgba(138, 58, 58, 0.12); color: #8A3A3A; }
    .transaction-item .tx-icon.achat { background: rgba(184, 134, 11, 0.12); color: #B8860B; }
    .transaction-item .tx-icon.vente { background: rgba(26, 58, 42, 0.2); color: #4A7A6A; }
    .transaction-item .tx-icon.gain { background: rgba(45, 125, 90, 0.08); color: #2D7D5A; }

    .transaction-item .tx-content {
      flex: 1;
      min-width: 0;
    }
    .transaction-item .tx-content .tx-title {
      font-size: 13px;
      font-weight: 500;
      color: #F5F0E8;
    }
    .transaction-item .tx-content .tx-desc {
      font-size: 11px;
      color: #5A5A4A;
    }
    .transaction-item .tx-amount {
      font-weight: 600;
      font-size: 14px;
      text-align: right;
      flex-shrink: 0;
    }
    .transaction-item .tx-amount.positive { color: #2D7D5A; }
    .transaction-item .tx-amount.negative { color: #8A3A3A; }
    .transaction-item .tx-status {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
      display: inline-block;
      margin-top: 2px;
    }
    .transaction-item .tx-status.valide { background: rgba(45, 125, 90, 0.12); color: #2D7D5A; }
    .transaction-item .tx-status.en_attente { background: rgba(184, 134, 11, 0.12); color: #B8860B; }
    .transaction-item .tx-status.rejete { background: rgba(138, 58, 58, 0.12); color: #8A3A3A; }

    .tx-empty {
      text-align: center;
      padding: 30px 0;
      color: #5A5A4A;
    }
    .tx-empty i {
      font-size: 32px;
      opacity: 0.3;
      margin-bottom: 10px;
      display: block;
    }

    /* ============================================================
       NOTIFICATION BANNER
       ============================================================ */
    .notif-permission-banner {
      background: rgba(184, 134, 11, 0.06);
      border: 1px solid rgba(184, 134, 11, 0.10);
      border-radius: 12px;
      padding: 12px 16px;
      margin: 18px 0 10px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .notif-permission-banner p {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .notif-permission-banner p i {
      color: var(--accent);
    }
    .notif-permission-banner .btn-enable {
      padding: 6px 16px;
      background: var(--accent);
      border: none;
      border-radius: 30px;
      color: var(--bg-dark);
      font-weight: 600;
      font-size: 11px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .notif-permission-banner .btn-enable:active {
      transform: scale(0.95);
    }
    .notif-permission-banner .btn-enable:hover {
      background: #9A7209;
    }

    /* ============================================================
       TOAST
       ============================================================ */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      max-width: 90%;
      width: 400px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    .toast.success {
      background: #0D2A1F;
      border: 1px solid #2D7D5A;
      color: #2D7D5A;
    }
    .toast.error {
      background: #2A0D0D;
      border: 1px solid #8A3A3A;
      color: #8A3A3A;
    }
    .toast.warning {
      background: #2A1A0D;
      border: 1px solid #B8860B;
      color: #B8860B;
    }
    .toast.info {
      background: #0D1A2A;
      border: 1px solid #4A7A8A;
      color: #4A7A8A;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 550px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .stat-item {
        padding: 10px 6px;
      }
      .stat-item .stat-value {
        font-size: 15px;
      }
      .filter-tabs {
        gap: 4px;
      }
      .filter-tab {
        font-size: 10px;
        padding: 4px 10px;
      }
      .container {
        padding: 12px 4%;
      }
      .card {
        padding: 14px;
      }
    }

    @media (min-width: 551px) and (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .stats-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (min-width: 1025px) {
      .stats-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }
    }
  </style>
</head>

        <button class="filter-tab" data-filter="achat"><i class="fas fa-shopping-cart"></i> Achats</button>
        <button class="filter-tab" data-filter="vente"><i class="fas fa-hand-holding-usd"></i> Ventes</button>
        <button class="filter-tab" data-filter="gain"><i class="fas fa-coins"></i> Gains</button>
      </div>
    </div>

    <!-- FILTRES PÉRIODE -->
    <div class="filter-section">
      <div class="filter-period" id="periodFilters">
        <button class="filter-tab" data-period="week">📆 Semaine</button>
        <button class="filter-tab" data-period="month">📆 Mois</button>
        <button class="filter-tab" data-period="year">📆 Année</button>
        <button class="filter-tab active" data-period="all">📆 Tout</button>
      </div>

    <div id="transactionsList">
      <div class="tx-empty">
        <i class="fas fa-clock"></i>
        <p>Aucune transaction</p>
      </div>

  </div>

  <!-- NOTIFICATION PERMISSION BANNER -->
  <div class="notif-permission-banner" id="notifPermissionBanner">
    <p><i class="fas fa-bell"></i> Activez les notifications pour suivre votre activité !</p>
    <button class="btn-enable" id="enableNotifBtn"><i class="fas fa-check"></i> Activer</button>

</main>

var statEpargnes = document.getElementById('statEpargnes');
var statParrainages = document.getElementById('statParrainages');
var transactionsList = document.getElementById('transactionsList');
var txCount = document.getElementById('txCount');
var toast = document.getElementById('toast');
var canvas = document.getElementById('gainChart');
var notifBadge = document.getElementById('notifBadge');
var notifStatusText = document.getElementById('notifStatusText');
var notifPermissionBanner = document.getElementById('notifPermissionBanner');
var enableNotifBtn = document.getElementById('enableNotifBtn');

var currentUser = null;
var userData = null;
var allTransactions = [];
var filteredTransactions = [];
var currentFilter = 'all';
var currentPeriod = 'all';
var unsubscribeUser = null;
var notificationTimeout = null;

// ================================================================
// TOAST
// ================================================================
function showToast(message, type) {
  type = type || 'info';
  toast.textContent = message;
  toast.className = 'toast ' + type;
  clearTimeout(notificationTimeout);
  setTimeout(function() {
    toast.classList.add('show');
  }, 50);
  notificationTimeout = setTimeout(function() {
    toast.classList.remove('show');
  }, 3500);
}

// ================================================================
// FORMATS
// ================================================================
function formatCurrency(amount) {
  if (!amount) return '0 FCFA';
  if (amount >= 1000000) return (amount / 1000000).toFixed(1) + 'M FCFA';
  if (amount >= 1000) return (amount / 1000).toFixed(1) + 'K FCFA';
  return amount.toLocaleString('fr-FR') + ' FCFA';
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  try {
    var d = new Date(dateStr);
    return d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    return dateStr;
  }
}

function escapeHtml(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ================================================================
// UPDATE STATS
// ================================================================
function updateStats(data) {
  if (!data) return;
  statBalance.textContent = formatCurrency(data.balance || 0);
  statRevenus.textContent = formatCurrency(data.gainsTotal || data.totalRevenus || 0);
  statParrainages.textContent = data.referralsCount || 0;
}

// ================================================================
// CHARGER TOUTES LES STATISTIQUES
// ================================================================
function loadAllStats(uid) {
  if (!uid) return;
  
  // Épargnes
  var qEpargnes = query(collection(db, 'epargnes'), where('userId', '==', uid));
  onSnapshot(qEpargnes, function(snapshot) {
    statEpargnes.textContent = snapshot.size;
  }, function(error) {
    console.error('Erreur chargement épargnes:', error);
  });
}

// ================================================================
// GRAPHIQUE
// ================================================================
function drawChart(gains) {
  var ctx = canvas.getContext('2d');
  var width = canvas.width = canvas.parentElement.clientWidth || 400;
  var height = canvas.height = 160;
  
  ctx.clearRect(0, 0, width, height);

  if (!gains || gains.length === 0) {
    ctx.fillStyle = '#5A5A4A';
    ctx.font = '13px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Aucune donnée disponible', width/2, height/2);
    return;
  }

  var max = Math.max.apply(null, gains) || 1;
  var padding = { top: 20, bottom: 25, left: 30, right: 20 };
  var chartWidth = width - padding.left - padding.right;
  var chartHeight = height - padding.top - padding.bottom;
  var barWidth = Math.min(chartWidth / gains.length * 0.5, 30);
  var gap = chartWidth / gains.length;

  var colors = ['#B8860B', '#2D7D5A', '#4A7A6A', '#8A6A7A', '#D4A017', '#6366F1'];

  gains.forEach(function(value, index) {
    var x = padding.left + (index * gap) + (gap - barWidth) / 2;
    var barHeight = (value / max) * chartHeight;
    var y = padding.top + chartHeight - barHeight;

    ctx.fillStyle = colors[index % colors.length];
    ctx.beginPath();
    ctx.roundRect(x, y, barWidth, barHeight, 3);
    ctx.fill();

    ctx.fillStyle = '#F5F0E8';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'center';
    var displayVal = value >= 1000 ? (value/1000).toFixed(1) + 'K' : value;
    ctx.fillText(displayVal, x + barWidth/2, y - 4);
  });

  ctx.fillStyle = '#5A5A4A';
  ctx.font = '9px Inter, sans-serif';
  ctx.textAlign = 'center';
  var labels = ['S1', 'S2', 'S3', 'S4', 'S5', 'S6'];
  gains.forEach(function(_, index) {
    var x = padding.left + (index * gap) + gap/2;
    ctx.fillText(labels[index] || '', x, height - 4);
  });
}

// ================================================================
// RENDER TRANSACTIONS
// ================================================================
function renderTransactions() {
  var filtered = allTransactions;
  
  if (currentFilter !== 'all') {
    filtered = filtered.filter(function(t) { return t.type === currentFilter; });
  }
  
  if (currentPeriod !== 'all') {
    var now = new Date();
    var cutoff = new Date(now);
    if (currentPeriod === 'week') cutoff.setDate(now.getDate() - 7);
    else if (currentPeriod === 'month') cutoff.setMonth(now.getMonth() - 1);
    else if (currentPeriod === 'year') cutoff.setFullYear(now.getFullYear() - 1);
    
    filtered = filtered.filter(function(t) {
      var date = new Date(t.timestamp || t.date || t.createdAt);
      return date >= cutoff;
    });
  }

  filteredTransactions = filtered;
  txCount.textContent = filtered.length + ' transaction(s)';

  if (filtered.length === 0) {
    transactionsList.innerHTML = '<div class="tx-empty"><i class="fas fa-clock"></i><p>Aucune transaction</p></div>';
    return;
  }

  var html = '';
  var display = filtered.slice(0, 20);

  display.forEach(function(t) {
    var isPositive = t.type === 'depot' || t.type === 'vente' || t.type === 'gain';
    var isNegative = t.type === 'retrait' || t.type === 'achat';
    var amountClass = isPositive ? 'positive' : (isNegative ? 'negative' : '');
    var sign = isPositive ? '+' : (isNegative ? '-' : '');

    var icon = 'fa-exchange-alt';
    var iconClass = '';
    var typeMap = {
      'depot': { icon: 'fa-arrow-down', cls: 'depot' },
      'retrait': { icon: 'fa-arrow-up', cls: 'retrait' },
      'achat': { icon: 'fa-shopping-cart', cls: 'achat' },
      'vente': { icon: 'fa-hand-holding-usd', cls: 'vente' },
      'gain': { icon: 'fa-coins', cls: 'gain' }
    };
    var map = typeMap[t.type] || { icon: 'fa-exchange-alt', cls: '' };
    icon = map.icon;
    iconClass = map.cls;

    var status = t.statut || t.status || 'en_attente';
    var statusClass = status === 'validé' || status === 'valide' || status === 'confirmed' ? 'valide' :
                     (status === 'rejeté' || status === 'rejete' || status === 'rejected' ? 'rejete' : 'en_attente');
    var statusText = statusClass === 'valide' ? '✅ Validé' :
                     (statusClass === 'rejete' ? '❌ Rejeté' : '⏳ En attente');

    var title = t.type === 'depot' ? 'Dépôt' :
                t.type === 'retrait' ? 'Retrait' :
                t.type === 'achat' ? 'Achat' :
                t.type === 'vente' ? 'Vente' :
                t.type === 'gain' ? 'Gain' : 'Transaction';

    var desc = t.description || t.productName || t.packName || '';
    var montant = t.montant || t.amount || 0;
    var date = t.timestamp || t.date || t.createdAt || '';

    html += '<div class="transaction-item">';
    html += '<div class="tx-icon ' + iconClass + '"><i class="fas ' + icon + '"></i></div>';
    html += '<div class="tx-content">';
    html += '<div class="tx-title">' + title + (desc ? ' — ' + escapeHtml(desc) : '') + '</div>';
    html += '<div class="tx-desc">' + formatDate(date) + '</div>';
    html += '</div>';
    html += '<div style="text-align:right;">';
    html += '<div class="tx-amount ' + amountClass + '">' + sign + formatCurrency(montant) + '</div>';
    html += '<span class="tx-status ' + statusClass + '">' + statusText + '</span>';
    html += '</div>';
    html += '</div>';
  });

  transactionsList.innerHTML = html;
}

// ================================================================
// LOAD TRANSACTIONS
// ================================================================
function loadTransactions(userId) {
  var allTx = [];
  var collections = ['depots', 'retraits', 'achats', 'ventes', 'gains', 'transactions'];
  var typeMap = {
    'depots': 'depot',
    'retraits': 'retrait',
    'achats': 'achat',
    'ventes': 'vente',
    'gains': 'gain',
    'transactions': 'transaction'
  };
  
  var promises = collections.map(function(col) {
    var q = query(
      collection(db, col),
      where('userId', '==', userId)
    );
    return getDocs(q).then(function(snapshot) {
      snapshot.forEach(function(doc) {
        var data = doc.data();
        var type = data.type || typeMap[col] || col.slice(0, -1);
        allTx.push({
          id: doc.id,
          ...data,
          _collection: col,
          type: type
        });
      });
    }).catch(function() {});
  });

  Promise.all(promises).then(function() {
    allTx.sort(function(a, b) {
      var dateA = a.timestamp || a.date || a.createdAt || '';
      var dateB = b.timestamp || b.date || b.createdAt || '';
      return new Date(dateB) - new Date(dateA);
    });

    allTransactions = allTx;
    renderTransactions();

    var gains = [];
    var now = new Date();
    for (var i = 5; i >= 0; i--) {
      var weekStart = new Date(now);
      weekStart.setDate(now.getDate() - (i * 7 + 6));
      var weekEnd = new Date(now);
      weekEnd.setDate(now.getDate() - (i * 7));
      
      var total = 0;
      allTx.forEach(function(t) {
        var date = new Date(t.timestamp || t.date || t.createdAt);
        if (date >= weekStart && date <= weekEnd && (t.type === 'gain' || t.type === 'vente')) {
          total += t.montant || t.amount || 0;
        }
      });
      gains.push(total);
    }
    drawChart(gains);
  });
}

// ================================================================
// FILTRES
// ================================================================
document.querySelectorAll('#typeFilters .filter-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('#typeFilters .filter-tab').forEach(function(t) {
      t.classList.remove('active');
    });
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    renderTransactions();
  });
});

document.querySelectorAll('#periodFilters .filter-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('#periodFilters .filter-tab').forEach(function(t) {
      t.classList.remove('active');
    });
    this.classList.add('active');
    currentPeriod = this.dataset.period;
    renderTransactions();
  });
});

// ================================================================
// NOTIFICATIONS FCM
// ================================================================
async function setupFCMNotifications() {
  try {
    if (Notification.permission === 'granted') {
      var token = await getToken(messaging, { vapidKey: VAPID_KEY });
      if (currentUser) {
        var userRef = doc(db, 'users', currentUser.uid);
        await updateDoc(userRef, { fcmToken: token, notificationsEnabled: true });
      }
      notifBadge.className = 'notif-badge';
      notifStatusText.textContent = '🔔';
      if (notifPermissionBanner) notifPermissionBanner.style.display = 'none';
      return token;
    }
    
    if (Notification.permission === 'denied') {
      notifBadge.className = 'notif-badge';
      notifStatusText.textContent = '🔕';
      if (notifPermissionBanner) notifPermissionBanner.style.display = 'none';
      return null;
    }
    
    notifBadge.className = 'notif-badge';
    notifStatusText.textContent = '🔔';
    if (notifPermissionBanner) notifPermissionBanner.style.display = 'flex';
    return null;
  } catch (error) {
    console.error('❌ Erreur FCM:', error);
    return null;
  }
}

if (enableNotifBtn) {
  enableNotifBtn.addEventListener('click', async function() {
    try {
      var permission = await Notification.requestPermission();
      if (permission === 'granted') {
        var token = await getToken(messaging, { vapidKey: VAPID_KEY });
        if (currentUser) {
          var userRef = doc(db, 'users', currentUser.uid);
          await updateDoc(userRef, { fcmToken: token, notificationsEnabled: true });
        }
        notifBadge.className = 'notif-badge';
        notifStatusText.textContent = '🔔';
        if (notifPermissionBanner) notifPermissionBanner.style.display = 'none';
        showToast('✅ Notifications activées !', 'success');
      } else {
        showToast('⚠️ Notifications désactivées.', 'warning');
      }
    } catch (error) {
      console.error('❌ Erreur permission:', error);
    }
  });
}

// ================================================================
// AUTH
// ================================================================
var authChecked = false;

onAuthStateChanged(auth, function(user) {
  if (user) {
    currentUser = user;
    localStorage.setItem('ARVEXA_current_user', user.uid);
    
    var cached = localStorage.getItem('ARVEXA_user_data');
    if (cached) {
      try {
        userData = JSON.parse(cached);
        updateStats(userData);
      } catch(e) {}
    }

    var userRef = doc(db, 'users', user.uid);

    getDoc(userRef).then(function(docSnap) {
      if (docSnap.exists()) {
        userData = docSnap.data();
        updateStats(userData);
        loadTransactions(user.uid);
        loadAllStats(user.uid);
      }
    }).catch(function(error) {
      console.error('Erreur chargement user:', error);
    });

    if (unsubscribeUser) unsubscribeUser();
    unsubscribeUser = onSnapshot(userRef, function(docSnap) {
      if (docSnap.exists()) {
        userData = docSnap.data();
        updateStats(userData);
        localStorage.setItem('ARVEXA_user_data', JSON.stringify(userData));
      }
    }, function(error) {
      console.error('Erreur onSnapshot:', error);
    });

    setupFCMNotifications();
    authChecked = true;
  } else {
    var savedUid = localStorage.getItem('ARVEXA_current_user');
    if (savedUid && !authChecked) {
      setTimeout(function() {
        if (!auth.currentUser) {
          window.location.href = 'login.html';
        }
      }, 1500);
    } else if (!authChecked) {
      window.location.href = 'login.html';
    }
    authChecked = true;
  }
});

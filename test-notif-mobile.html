<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Mobile ARVEXA</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0A0A0A; color: #fff; padding: 20px; }
    .btn { 
      background: #B8860B; color: #000; border: none; 
      padding: 16px; border-radius: 12px; font-size: 16px;
      margin: 8px 0; width: 100%; cursor: pointer; font-weight: bold;
    }
    .status { padding: 12px; border-radius: 8px; margin: 8px 0; }
    .ok { background: rgba(45,125,90,0.2); border: 1px solid #2D7D5A; color: #2D7D5A; }
    .err { background: rgba(138,58,58,0.2); border: 1px solid #8A3A3A; color: #8A3A3A; }
  </style>
</head>
<body>
  <h1>📱 Test Mobile</h1>
  <div id="status" class="status">⏳ Chargement...</div>
  <button class="btn" id="testBtn">🔔 Tester notification</button>
  <button class="btn" id="swBtn">📋 Vérifier SW</button>

  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js",
      "firebase/messaging": "https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging.js"
    }
  }
  </script>

  <script type="module">
  import { initializeApp } from "firebase/app";
  import { getMessaging, getToken } from "firebase/messaging";
  import { getAuth, onAuthStateChanged } from "firebase/auth";

  const config = {
    apiKey: "AIzaSyBEbYuuUlNCLMBUHClv4UnyownNHw2q3_g",
    authDomain: "nexgen-39043.firebaseapp.com",
    projectId: "nexgen-39043",
    storageBucket: "nexgen-39043.firebasestorage.app",
    messagingSenderId: "619390144325",
    appId: "1:619390144325:web:35d96b125501e4e8b1782c"
  };

  const app = initializeApp(config);
  const auth = getAuth(app);
  const messaging = getMessaging(app);
  const status = document.getElementById('status');

  function setStatus(msg, type = 'ok') {
    status.textContent = msg;
    status.className = `status ${type}`;
  }

  // Vérifier l'état
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      setStatus('⚠️ Connectez-vous en tant qu\'admin', 'err');
      return;
    }

    if (user.email !== 'gagneavecia@gmail.com') {
      setStatus('⚠️ Vous n\'êtes pas admin', 'err');
      return;
    }

    setStatus('✅ Admin connecté');

    // Vérifier la permission
    const perm = Notification.permission;
    setStatus(`📌 Permission: ${perm}`, perm === 'granted' ? 'ok' : 'err');

    if (perm === 'granted') {
      try {
        const token = await getToken(messaging, {
          vapidKey: "BA8jFHMi3fNPkB4iAqib8GJnrq1_8KR2u_PyQjI2q5rp6rzmaGAsZ_aHm7TP1FqvXg4ZhOUBQUrQ6jpEf9qmrlM"
        });
        setStatus(`✅ Token: ${token.substring(0, 20)}...`, 'ok');
        console.log('📱 Token complet:', token);
      } catch (e) {
        setStatus(`❌ Erreur token: ${e.message}`, 'err');
        console.error(e);
      }
    }
  });

  // Test notification
  document.getElementById('testBtn').addEventListener('click', () => {
    if (Notification.permission === 'granted') {
      new Notification('🔔 Test ARVEXA', {
        body: 'Cette notification vient de votre téléphone !',
        icon: '/favicon.ico',
        vibrate: [200, 100, 200]
      });
      setStatus('✅ Notification envoyée', 'ok');
    } else {
      setStatus('⚠️ Permission non accordée', 'err');
    }
  });

  // Vérifier SW
  document.getElementById('swBtn').addEventListener('click', async () => {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      setStatus(`📋 SW: ${regs.length} registré(s)`, regs.length > 0 ? 'ok' : 'err');
      console.log('SW registrations:', regs);
    } catch (e) {
      setStatus(`❌ Erreur SW: ${e.message}`, 'err');
    }
  });
  </script>
</body>
</html>

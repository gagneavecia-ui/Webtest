<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="description" content="ARVEXA - Réinitialiser votre mot de passe">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* ===== ROOT ===== */
    :root {
      --primary: #1A3A2A;
      --primary-dark: #0A1A12;
      --primary-light: #2A5A3A;
      --accent: #B8860B;
      --accent-dim: rgba(184, 134, 11, 0.08);
      --success: #2D7D5A;
      --bg-dark: #0A0A0A;
      --bg-surface: #141414;
      --bg-card: rgba(20, 20, 20, 0.7);
      --text-light: #F5F0E8;
      --text-dim: #8A8A7A;
      --text-muted: #5A5A4A;
      --card-border: rgba(184, 134, 11, 0.06);
      --glass-bg: rgba(26, 58, 42, 0.15);
      --glass-border: rgba(184, 134, 11, 0.04);
      --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
      --danger: #8A3A3A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      opacity: 0;
      animation: pageFadeIn 0.5s ease forwards;
      -webkit-overflow-scrolling: touch;
    }

    @keyframes pageFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse 40% 30% at 30% 20%, rgba(26, 58, 42, 0.12) 0%, transparent 70%),
                  radial-gradient(ellipse 30% 20% at 70% 80%, rgba(184, 134, 11, 0.02) 0%, transparent 60%),
                  linear-gradient(180deg, #0A0A0A 0%, #060606 100%);
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.15;
      animation: glowMove 10s ease-in-out infinite alternate;
    }
    .glow-1 { width: 350px; height: 350px; background: rgba(26,58,42,0.15); top: -80px; right: -80px; }
    .glow-2 { width: 200px; height: 200px; background: rgba(184,134,11,0.03); bottom: 0; left: 0; animation-delay: -4s; }
    .glow-3 { width: 250px; height: 250px; background: rgba(26,58,42,0.08); top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }
    @keyframes glowMove {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px,-20px) scale(1.1); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 5%;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      letter-spacing: 2px;
      color: var(--text-light);
      text-decoration: none;
    }
    .logo-text span {
      color: var(--accent);
      font-style: italic;
    }

    .back-btn {
      width: clamp(32px, 4vw, 40px);
      height: clamp(32px, 4vw, 40px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:active {
      transform: scale(0.94);
      background: rgba(184, 134, 11, 0.08);
    }
    .back-btn i {
      font-size: clamp(14px, 1.8vw, 18px);
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
    }

    .reset-card {
      background: var(--bg-card);
      backdrop-filter: blur(14px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 32px 24px;
      animation: fadeInUp 0.6s ease-out;
      box-shadow: var(--shadow);
      width: 100%;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .reset-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .reset-header .icon {
      font-size: 48px;
      color: var(--accent);
      margin-bottom: 10px;
      display: block;
    }
    .reset-header h1 {
      font-size: 24px;
      font-weight: 700;
      font-family: 'Playfair Display', 'Georgia', serif;
      color: var(--text-light);
    }
    .reset-header h1 span {
      color: var(--accent);
      font-style: italic;
    }
    .reset-header p {
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 300;
      margin-top: 4px;
    }

    .message-banner {
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-banner.success {
      background: rgba(45, 125, 90, 0.1);
      border: 1px solid rgba(45, 125, 90, 0.2);
      color: var(--success);
    }
    .message-banner.error {
      background: rgba(184, 134, 11, 0.1);
      border: 1px solid rgba(184, 134, 11, 0.2);
      color: var(--accent);
    }
    .message-banner.warning {
      background: rgba(184, 134, 11, 0.08);
      border: 1px solid rgba(184, 134, 11, 0.15);
      color: #D4A017;
    }
    .hidden { display: none; }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(10, 10, 10, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      transition: var(--transition);
    }
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.08);
    }
    .input-wrapper .icon-left {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
      z-index: 2;
    }
    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 44px;
      background: transparent;
      border: none;
      color: var(--text-light);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .input-wrapper input::placeholder {
      color: var(--text-muted);
      opacity: 0.5;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: var(--bg-dark);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
    }
    .submit-btn:active {
      transform: scale(0.97);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .submit-btn .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--bg-dark);
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-to-login {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .back-to-login a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      max-width: 90%;
      width: 400px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    .toast.success {
      background: #0D2A1F;
      border: 1px solid #2D7D5A;
      color: #2D7D5A;
    }
    .toast.error {
      background: #2A0D0D;
      border: 1px solid #8A3A3A;
      color: #8A3A3A;
    }
    .toast.warning {
      background: #2A1A0D;
      border: 1px solid #B8860B;
      color: #B8860B;
    }
    .toast.info {
      background: #0D1A2A;
      border: 1px solid #4A7A8A;
      color: #4A7A8A;
    }

    @media (max-width: 480px) {
      .reset-card { padding: 20px 16px; }
      .reset-header h1 { font-size: 20px; }
      .reset-header .icon { font-size: 36px; }
    }

    @media (min-width: 768px) {
      .container { max-width: 600px; padding: 40px 5%; }
      .reset-card { padding: 36px 32px; }
    }

    @media (min-width: 1024px) {
      .container { max-width: 700px; }
      .reset-card { padding: 44px 40px; }
    }
  </style>
</head>
<body>

<div class="gradient-bg"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>

<header class="header">
  <a href="login.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  <a href="index.html" class="logo-text">ARVE<span>XA</span></a>
  <div style="width:40px;"></div>
</header>

<main class="container">
  <div class="reset-card">
    <div class="reset-header">
      <span class="icon"><i class="fas fa-key"></i></span>
      <h1>Mot de passe <span>oublié</span></h1>
      <p>Entrez votre email pour recevoir un lien de réinitialisation</p>
    </div>

    <div id="messageBanner" class="message-banner hidden">
      <i id="messageIcon" class="fas fa-info-circle"></i>
      <span id="messageText"></span>
    </div>

    <form id="resetForm">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope icon-left"></i>
          <input type="email" id="email" placeholder="exemple@email.com" autocomplete="email" required>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="resetBtn">
        <i class="fas fa-paper-plane"></i> Envoyer le lien
      </button>
    </form>

    <div class="back-to-login">
      <a href="login.html"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<!-- ================================================================ -->
<!-- ERUDA -->
<!-- ================================================================ -->
<script>
(function() {
  var isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
  var isDebug = location.search.indexOf("debug=true") !== -1 || location.search.indexOf("eruda=true") !== -1;
  if (isLocal || isDebug) {
    if (document.querySelector('script[data-eruda]')) return;
    var s = document.createElement("script");
    s.setAttribute("data-eruda", "true");
    s.src = "https://cdn.jsdelivr.net/npm/eruda";
    s.onload = function() {
      if (typeof eruda !== 'undefined') {
        eruda.init({ tool: ['console', 'network', 'elements'], defaults: { displaySize: 40 } });
        console.log("🐞 Eruda active - Reset Password");
      }
    };
    document.head.appendChild(s);
  }
})();
</script>

<!-- ================================================================ -->
<!-- IMPORTS -->
<!-- ================================================================ -->
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js"
  }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { 
  getAuth, 
  sendPasswordResetEmail,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

// ================================================================
// FIREBASE CONFIG
// ================================================================
var firebaseConfig = {
  apiKey: "AIzaSyBEbYuuUlNCLMBUHClv4UnyownNHw2q3_g",
  authDomain: "nexgen-39043.firebaseapp.com",
  projectId: "nexgen-39043",
  storageBucket: "nexgen-39043.firebasestorage.app",
  messagingSenderId: "619390144325",
  appId: "1:619390144325:web:35d96b125501e4e8b1782c",
  measurementId: "G-HC2Q5DNKDR"
};

var app = initializeApp(firebaseConfig);
var auth = getAuth(app);
setPersistence(auth, browserLocalPersistence);

// ================================================================
// DOM
// ================================================================
var resetForm = document.getElementById('resetForm');
var resetBtn = document.getElementById('resetBtn');
var messageBanner = document.getElementById('messageBanner');
var messageIcon = document.getElementById('messageIcon');
var messageText = document.getElementById('messageText');
var toast = document.getElementById('toast');

// ================================================================
// TOAST
// ================================================================
function showToast(message, type) {
  type = type || 'info';
  toast.textContent = message;
  toast.className = 'toast ' + type;
  setTimeout(function() { toast.classList.add('show'); }, 50);
  setTimeout(function() { toast.classList.remove('show'); }, 4000);
}

// ================================================================
// MESSAGE
// ================================================================
function showMessage(text, type) {
  type = type || 'error';
  messageBanner.className = 'message-banner ' + type;
  messageIcon.className = type === 'error' ? 'fas fa-exclamation-circle' : 
                         (type === 'success' ? 'fas fa-check-circle' : 'fas fa-info-circle');
  messageText.textContent = text;
  messageBanner.classList.remove('hidden');
}

function hideMessage() {
  messageBanner.classList.add('hidden');
}

// ================================================================
// RESET PASSWORD - COMPLET
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
  var resetForm = document.getElementById('resetForm');
  var resetBtn = document.getElementById('resetBtn');
  var emailInput = document.getElementById('email');

  if (resetForm) {
    resetForm.addEventListener('submit', function(e) {
      e.preventDefault();

      var email = emailInput.value.trim();

      if (!email) {
        alert('Veuillez entrer votre email.');
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Envoi...';

      var actionCodeSettings = {
        url: 'https://gagneavecia-ui.github.io/ARVEXA/login.html',
        handleCodeInApp: false
      };

      sendPasswordResetEmail(auth, email, actionCodeSettings)
        .then(function() {
          alert('✅ Un email de réinitialisation vous a été envoyé !');
          resetBtn.disabled = false;
          resetBtn.textContent = 'Envoyer le lien';
        })
        .catch(function(error) {
          alert('❌ Erreur: ' + error.message);
          resetBtn.disabled = false;
          resetBtn.textContent = 'Envoyer le lien';
        });
    });
  }
});
  
console.log("🔑 ARVEXA - Page réinitialisation mot de passe chargée");
</script>
</body>
</html>
